# realtime_explore (perception producer) module config — loaded by
# walkie_config.load_config() AFTER the root config.toml (same setdefault walk), so
# precedence is: shell env > .env > root config.toml > THIS FILE > code default.
# The keys ARE the exact env-var names (WALKIE_EXPLORE_*, renamed from the legacy
# WALKIE_GRAPHS_* prefix); tables are just grouping.
#
# realtime_explore is the robot's perception loop: a cheap CAPTURE thread streams RGB-D
# frames + detections into an on-disk snapshot ring buffer and writes the live
# perception.json, while an occasional BATCH BUILD worker fuses a window of snapshots
# (refine poses → lift masks → constrained-agglomerative association) and pushes the
# result into the walkie_world SceneStore via world.observe_objects. The scene-store +
# relations knobs live in walkie_world/config.toml. Full pipeline: docs/WALKIE_WORLD.md.

[explore]
# Gates whether the perception loop runs at all. Off ⇒ no capture, no new objects, no
# perception.json (the store still loads from disk so the database agent can read existing
# memory).
WALKIE_EXPLORE_ENABLED = "1"
# Per-tick / per-build timing + per-detection ingest diagnostics (off in normal operation).
WALKIE_EXPLORE_PERF = "0"
WALKIE_EXPLORE_DEBUG_INGEST = "1"
# Capture-thread cadence (seconds): one frame + one detect/caption/embed round-trip per tick.
WALKIE_EXPLORE_INTERVAL_SEC = "2.0"
# Compute device for Open3D tensor ops (pose-graph / TSDF): "auto" picks CUDA iff available,
# else CPU. Never raises.
WALKIE_EXPLORE_O3D_DEVICE = "auto"
# "Interested classes": the open-vocab prompts sent to the detector AND the scope of what
# enters the graph. Empty = keep everything the detector emits. Names may contain spaces.
WALKIE_EXPLORE_INTERESTED_CLASSES = "sofa,door,chair,armchair,table,stool,shirt,sponge,bowl,cup,fork,knife,plate,spoon,coke,ice tea,milk,orange juice,red bull,water bottle,bread,cornflakes,instant noodles,potato,tomato soup,apple,avocado,lemon,orange,chips,cookies,gum,mixed nuts,pringles,hand cream,soap,toothpaste,dish rack,shelf,monitor,bed,pillow"
# Always dropped before a detection becomes a node (moving things can't be position-deduped).
WALKIE_EXPLORE_EXCLUDE_CLASSES = "person"
# Only these classes get a server image-caption (cost control). Empty = same as interested.
WALKIE_EXPLORE_CAPTION_CLASSES = "shirt"
# Scene-graph Rerun layer (drawn into the shared services/viz session; enable Rerun itself
# with WALKIE_VIZ=rerun, the default). These only control WHAT the scene-graph layer draws —
# object point clouds always show; boxes/labels/background are toggles.
WALKIE_EXPLORE_VIZ_BOXES = "1"        # per-object AABB box
WALKIE_EXPLORE_VIZ_LABELS = "1"       # class-name label on each object
WALKIE_EXPLORE_VIZ_BACKGROUND = "1"   # faint TSDF structural cloud (only when TSDF is on)
# Live feed: draw every captured frame's lifted detections under world/live as the robot
# scans (independent of the batch build's world/objects). A debug aid — costs one extra
# mask-lift per detection per tick, so off by default.
WALKIE_EXPLORE_VIZ_LIVE = "0"

[explore.camera]
# TF lookup that gives each frame its camera→map pose (lift + head-tilt baked in by the TF
# tree). The optical frame's axes match the pinhole back-projection, so no axis swap.
WALKIE_EXPLORE_TF_MAP_FRAME = "map"
WALKIE_EXPLORE_TF_CAMERA_FRAME = "zed_head_left_camera_frame_optical"
WALKIE_EXPLORE_TF_TIMEOUT_SEC = "1.0"

[explore.lift]
# Per-detection mask→world-cloud deprojection + flying-pixel cleanup (interfaces.perception.
# geometry.deproject_mask), shared by the build path and CameraSnapshot.mask_to_points.
WALKIE_EXPLORE_VOXEL_M = "0.01"                 # voxel-downsample size (m)
WALKIE_EXPLORE_MAX_DEPTH_M = "4.0"              # drop depth past this (stereo error grows ~d^2)
WALKIE_EXPLORE_MIN_POINTS = "50"               # drop a lift with fewer points than this
WALKIE_EXPLORE_MAX_POINTS_PER_OBJ = "25000"    # cap per-detection cloud
WALKIE_EXPLORE_MASK_ERODE_PX = "1"             # shrink each mask inward (drop the silhouette rim)
WALKIE_EXPLORE_DEPTH_EDGE_THRESH_M = "0.05"    # drop pixels on a depth jump > this (flying pixels)
WALKIE_EXPLORE_DEPTH_EDGE_REL = "0.02"         # grow that threshold with depth (keep grazing surfaces)
WALKIE_EXPLORE_SOR_K = "16"                    # statistical-outlier-removal neighbours (0 = off)
WALKIE_EXPLORE_SOR_STD_RATIO = "2.0"           # SOR std-dev ratio
WALKIE_EXPLORE_CONFIDENCE_THRESHOLD = "0.3"    # min detector confidence to enter the graph
WALKIE_EXPLORE_CROP_MARGIN_PX = "20"           # crop padding for the server caption/embed

[explore.capture]
# The on-disk snapshot ring buffer the capture thread fills.
WALKIE_EXPLORE_BUFFER_DIR = "graph_buffer"
# Ring cap (snapshots). ~1 MB each at 720p/10 dets; 400 ≈ a few hundred MB / ~13 min @ 2 s.
WALKIE_EXPLORE_SNAPSHOT_CAP = "400"
# Keep the RGB frame in each snapshot — required ONLY for pose_mode=auto (RGB-D odometry).
# TSDF is depth-only and does NOT need it. Off saves disk.
WALKIE_EXPLORE_KEEP_RGB = "0"

[explore.build]
# Build trigger: rebuild after this many NEW snapshots, but no more often than the min
# interval (seconds); single-flight (one build at a time). On a cold start (empty store) the
# first build fires after FIRST_BUILD_N so the database agent isn't blind for a full window.
# Tuned for a near-real-time scene: a rebuild every ~5 snapshots (~10 s at INTERVAL_SEC=2)
# so the scene graph keeps up with the robot; merge-into-persisted accretes across builds.
WALKIE_EXPLORE_REBUILD_EVERY_N = "5"
WALKIE_EXPLORE_REBUILD_MIN_INTERVAL_SEC = "4"
WALKIE_EXPLORE_FIRST_BUILD_N = "3"
# Build over the newest N buffered snapshots (0 = whole buffer). Bounded so each frequent build
# stays cheap; merge-into-persisted accumulates older objects into the durable store regardless.
WALKIE_EXPLORE_BUILD_WINDOW = "60"
# Pose refinement for a build window. "baseline" = trust the nav/TF pose as captured (no Open3D,
# no risk — the permanent default until a replayed-buffer measurement proves "auto" wins).
# "auto" = Open3D RGB-D odometry + pose-graph global optimization (needs KEEP_RGB=1).
WALKIE_EXPLORE_POSE_MODE = "baseline"
# Fuse the volumetric TSDF map (VoxelBlockGrid) during a build. Off by default — the only task
# consumer needs object centroids, not a surface. Needs Open3D (CUDA preferred); validate on a
# replayed buffer before enabling.
WALKIE_EXPLORE_TSDF = "0"

[explore.assoc]
# Batch constrained-agglomerative association (associate.py), run once per build over the
# window's detections with clean poses:
#   overlap_min          — mutual-min cloud overlap to link two detections (kills flat-into-table)
#   clip_min             — CLIP cosine to link two SAME-class detections (semantic agreement)
#   cross_class_clip_min — stricter CLIP cosine to link two DIFFERENT-class detections; recovers
#                          detector label flip-flop (cup↔mug) without fusing distinct objects.
#                          Set >= 2.0 to disable cross-class merging.
#   max_dist_m           — hard centroid cap on any merge (kills identical-twin fusion); also the
#                          match radius when merging a build's objects into the persisted store.
WALKIE_EXPLORE_ASSOC_OVERLAP_MIN = "0.2"
WALKIE_EXPLORE_ASSOC_CLIP_MIN = "0.85"
WALKIE_EXPLORE_ASSOC_CROSS_CLASS_CLIP_MIN = "0.95"
WALKIE_EXPLORE_ASSOC_MAX_DIST_M = "0.5"

# NOTE: the scene-store + relations knobs ([explore.store] / [explore.relations]) moved
# to walkie_world/config.toml — the store and relation derivation are now owned by the
# walkie_world domain model, not this perception producer. The env-var NAMES are
# unchanged (WALKIE_EXPLORE_STORE_DIR, WALKIE_EXPLORE_MIN_OBS_CONFIRM, ...), so code that
# reads them via os.getenv is unaffected.
