# walkie_graphs module config — loaded by walkie_config.load_config() AFTER the root
# config.toml (same setdefault walk), so precedence is:
#   shell env > .env > root config.toml > THIS FILE > code default.
# The keys ARE the exact env-var names; tables are just grouping.
#
# walkie_graphs is the robot's 3D spatial memory: a cheap CAPTURE thread streams RGB-D
# frames + detections into an on-disk snapshot ring buffer and writes the live
# perception.json, while an occasional BATCH BUILD worker fuses a window of snapshots
# (refine poses → lift masks → constrained-agglomerative association → merge into the
# persisted numpy SceneStore → derive relations). The database sub-agent queries the
# store. Full pipeline + design notes: docs/WALKIE_GRAPHS.md.

[graphs]
# Gates whether the perception loop runs at all. Off ⇒ no capture, no new objects, no
# perception.json (the store still loads from disk so the database agent can read existing
# memory).
WALKIE_GRAPHS_ENABLED = "1"
# Per-tick / per-build timing + per-detection ingest diagnostics (off in normal operation).
WALKIE_GRAPHS_PERF = "0"
WALKIE_GRAPHS_DEBUG_INGEST = "0"
# Capture-thread cadence (seconds): one frame + one detect/caption/embed round-trip per tick.
WALKIE_GRAPHS_INTERVAL_SEC = "2.0"
# Compute device for Open3D tensor ops (pose-graph / TSDF): "auto" picks CUDA iff available,
# else CPU. Never raises.
WALKIE_GRAPHS_O3D_DEVICE = "auto"
# "Interested classes": the open-vocab prompts sent to the detector AND the scope of what
# enters the graph. Empty = keep everything the detector emits. Names may contain spaces.
WALKIE_GRAPHS_INTERESTED_CLASSES = "sofa,door,chair,armchair,table,stool,shirt,sponge,bowl,cup,fork,knife,plate,spoon,coke,ice tea,milk,orange juice,red bull,water bottle,bread,cornflakes,instant noodles,potato,tomato soup,apple,avocado,lemon,orange,chips,cookies,gum,mixed nuts,pringles,hand cream,soap,toothpaste,dish rack,shelf,monitor,bed,pillow"
# Always dropped before a detection becomes a node (moving things can't be position-deduped).
WALKIE_GRAPHS_EXCLUDE_CLASSES = "person"
# Only these classes get a server image-caption (cost control). Empty = same as interested.
WALKIE_GRAPHS_CAPTION_CLASSES = "shirt"
# Scene-graph Rerun layer (drawn into the shared services/viz session; enable Rerun itself
# with WALKIE_VIZ=rerun, the default). These only control WHAT the scene-graph layer draws —
# object point clouds always show; boxes/labels/background are toggles.
WALKIE_GRAPHS_VIZ_BOXES = "1"        # per-object AABB box
WALKIE_GRAPHS_VIZ_LABELS = "1"       # class-name label on each object
WALKIE_GRAPHS_VIZ_BACKGROUND = "1"   # faint TSDF structural cloud (only when TSDF is on)

[graphs.camera]
# TF lookup that gives each frame its camera→map pose (lift + head-tilt baked in by the TF
# tree). The optical frame's axes match the pinhole back-projection, so no axis swap.
WALKIE_GRAPHS_TF_MAP_FRAME = "map"
WALKIE_GRAPHS_TF_CAMERA_FRAME = "zed_head_left_camera_frame_optical"
WALKIE_GRAPHS_TF_TIMEOUT_SEC = "1.0"

[graphs.lift]
# Per-detection mask→world-cloud deprojection + flying-pixel cleanup (interfaces.perception.
# geometry.deproject_mask), shared by the build path and CameraSnapshot.mask_to_points.
WALKIE_GRAPHS_VOXEL_M = "0.01"                 # voxel-downsample size (m)
WALKIE_GRAPHS_MAX_DEPTH_M = "4.0"              # drop depth past this (stereo error grows ~d^2)
WALKIE_GRAPHS_MIN_POINTS = "50"               # drop a lift with fewer points than this
WALKIE_GRAPHS_MAX_POINTS_PER_OBJ = "25000"    # cap per-detection cloud
WALKIE_GRAPHS_MASK_ERODE_PX = "1"             # shrink each mask inward (drop the silhouette rim)
WALKIE_GRAPHS_DEPTH_EDGE_THRESH_M = "0.05"    # drop pixels on a depth jump > this (flying pixels)
WALKIE_GRAPHS_DEPTH_EDGE_REL = "0.02"         # grow that threshold with depth (keep grazing surfaces)
WALKIE_GRAPHS_SOR_K = "16"                    # statistical-outlier-removal neighbours (0 = off)
WALKIE_GRAPHS_SOR_STD_RATIO = "2.0"           # SOR std-dev ratio
WALKIE_GRAPHS_CONFIDENCE_THRESHOLD = "0.3"    # min detector confidence to enter the graph
WALKIE_GRAPHS_CROP_MARGIN_PX = "20"           # crop padding for the server caption/embed

[graphs.capture]
# The on-disk snapshot ring buffer the capture thread fills.
WALKIE_GRAPHS_BUFFER_DIR = "graph_buffer"
# Ring cap (snapshots). ~1 MB each at 720p/10 dets; 400 ≈ a few hundred MB / ~13 min @ 2 s.
WALKIE_GRAPHS_SNAPSHOT_CAP = "400"
# Keep the RGB frame in each snapshot — required ONLY for pose_mode=auto (RGB-D odometry).
# TSDF is depth-only and does NOT need it. Off saves disk.
WALKIE_GRAPHS_KEEP_RGB = "0"

[graphs.build]
# Build trigger: rebuild after this many NEW snapshots, but no more often than the min
# interval (seconds); single-flight (one build at a time). On a cold start (empty store) the
# first build fires after FIRST_BUILD_N so the database agent isn't blind for a full window.
WALKIE_GRAPHS_REBUILD_EVERY_N = "30"
WALKIE_GRAPHS_REBUILD_MIN_INTERVAL_SEC = "20"
WALKIE_GRAPHS_FIRST_BUILD_N = "10"
# Build over the newest N buffered snapshots (0 = whole buffer). Bounded by default so a build
# stays cheap; merge-into-persisted accumulates older objects into the durable store regardless.
WALKIE_GRAPHS_BUILD_WINDOW = "90"
# Pose refinement for a build window. "baseline" = trust the nav/TF pose as captured (no Open3D,
# no risk — the permanent default until a replayed-buffer measurement proves "auto" wins).
# "auto" = Open3D RGB-D odometry + pose-graph global optimization (needs KEEP_RGB=1).
WALKIE_GRAPHS_POSE_MODE = "baseline"
# Fuse the volumetric TSDF map (VoxelBlockGrid) during a build. Off by default — the only task
# consumer needs object centroids, not a surface. Needs Open3D (CUDA preferred); validate on a
# replayed buffer before enabling.
WALKIE_GRAPHS_TSDF = "0"

[graphs.assoc]
# Batch constrained-agglomerative association (associate.py), run once per build over the
# window's detections with clean poses:
#   overlap_min          — mutual-min cloud overlap to link two detections (kills flat-into-table)
#   clip_min             — CLIP cosine to link two SAME-class detections (semantic agreement)
#   cross_class_clip_min — stricter CLIP cosine to link two DIFFERENT-class detections; recovers
#                          detector label flip-flop (cup↔mug) without fusing distinct objects.
#                          Set >= 2.0 to disable cross-class merging.
#   max_dist_m           — hard centroid cap on any merge (kills identical-twin fusion); also the
#                          match radius when merging a build's objects into the persisted store.
WALKIE_GRAPHS_ASSOC_OVERLAP_MIN = "0.2"
WALKIE_GRAPHS_ASSOC_CLIP_MIN = "0.85"
WALKIE_GRAPHS_ASSOC_CROSS_CLASS_CLIP_MIN = "0.95"
WALKIE_GRAPHS_ASSOC_MAX_DIST_M = "0.5"

[graphs.store]
# The lean scene store: nodes.json + embeddings.npy + edges.json (+ map.npz when TSDF is on).
WALKIE_GRAPHS_STORE_DIR = "graph_scene"
# Confirmation gate: hide objects seen fewer than MIN_OBS_CONFIRM times from queries (a build's
# n_obs is the cluster's member count, so a thing seen twice in one window confirms instantly).
WALKIE_GRAPHS_MIN_OBS_CONFIRM = "2"
WALKIE_GRAPHS_REQUIRE_CONFIRMATION = "1"
# Cap the persisted store; prune the oldest by last_seen beyond this.
WALKIE_GRAPHS_PRUNE_MAX_RECORDS = "500"

[graphs.relations]
# Geometric near/on/above/inside edges derived from object AABBs each build (relations.py).
WALKIE_GRAPHS_RELATION_MAX_DIST = "1.0"   # ignore pairs farther apart than this (m)
WALKIE_GRAPHS_NEAR_M = "0.6"              # centroid distance for a "near" edge
WALKIE_GRAPHS_XY_OVERLAP_MIN = "0.15"     # min footprint overlap for on/above
WALKIE_GRAPHS_Z_TOL = "0.05"              # vertical slack
WALKIE_GRAPHS_ON_GAP = "0.08"            # gap <= this ⇒ "on", else "above"
WALKIE_GRAPHS_CONTAIN_TOL = "0.02"        # AABB-containment slack for "inside"
