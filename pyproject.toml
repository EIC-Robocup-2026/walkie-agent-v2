[project]
name = "walkie-agent-v2"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "chromadb>=0.5",
    "flask>=3.1.3",
    "langchain>=1.2.14",
    "langchain-openai>=0.2",
    "langgraph>=0.2",
    "numpy>=2.4.4",
    "onnxruntime>=1.24.4",
    "opencv-python>=4.13.0.92",
    "pillow>=12.2.0",
    "pyaudio>=0.2.14",
    "pydub>=0.25.1",
    "pytest>=9.0.2",
    "python-dotenv>=1.2.2",
    "scipy>=1.17.1",
    "silero-vad>=6.2.1",
    "sounddevice>=0.5.5",
    "walkie-sdk",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "requests>=2.32.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv.sources]
walkie-sdk = { git = "https://github.com/EIC-Robocup-2026/walkie-sdk.git" }
