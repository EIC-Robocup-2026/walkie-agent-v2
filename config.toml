# walkie-agent-v2 config.
#
# This file holds nearly all configuration — tuning knobs plus the endpoints and
# transport that used to live in .env. None of it is secret, so it's safe to
# version-control. The ONLY things left in .env are the OpenRouter API key and
# its base URL (OPENROUTER_API_KEY / OPENROUTER_BASE_URL).
#
# Precedence (highest wins):
#   1. a real shell environment variable
#   2. a value in .env
#   3. a value here in config.toml
#   4. the hardcoded default in code
#
# So you can still override any of these from .env or the shell for a one-off
# run without editing this file. Values are written as the same strings the
# code's os.getenv() calls expect (e.g. "1"/"0" for flags, "" to disable).
#
# Competition tasks keep their own config in tasks/<NAME>/config.toml, loaded
# BEFORE this file (tasks.common.load_task_config) — so a task file both holds
# its task-specific keys and may override any global key here for that task.

[llm]
# 1 = use a local OpenAI-compatible LLM (LOCAL_BASE_URL/LOCAL_MODEL) instead of
# OpenRouter. The OpenRouter API key + base URL are the only things left in .env.
LLM_USE_LOCAL = "0"
WALKIE_MODEL = "google/gemini-3-flash-preview:nitro"
WALKIE_TEMPERATURE = "0.5"
# Local LLM endpoint (OpenAI-compatible), used when LLM_USE_LOCAL=1.
LOCAL_BASE_URL = "http://10.0.0.202:8000/v1"
LOCAL_MODEL = "qwen3.5-9b"

[services]
# Remote AI inference server (walkie-ai-server): STT, TTS, object detection,
# image captioning, pose estimation, CLIP image-embed.
WALKIE_AI_BASE_URL = "http://10.0.0.202:5000"

[transport]
# walkie-sdk robot transport. ROS services over rosbridge (default), camera over
# zenoh. Force zenoh services only if you've shipped the perception/srv into
# zenoh_ros2_sdk. Port defaults: 9090 for rosbridge, 7447 for zenoh.
WALKIE_ROS_PROTOCOL = "hybrid"
WALKIE_ROS_PORT = "9090"
# IP of the robot for the walkie-sdk transport (rosbridge + zenoh camera). Leave
# 127.0.0.1 when running on the robot itself; set to walkie's own LAN IP (e.g.
# 10.0.0.201) when running from a developer PC. Note: walkie is NOT the same
# machine as the AI server at WALKIE_AI_BASE_URL — they're separate boxes.
WALKIE_ROBOT_IP = "127.0.0.1"

[map]
# Shared named-location ("map") file every challenge drives to (rooms + locations
# with pose=[x,y,heading_rad], read by tasks/skills/locations.py). This is the
# world.toml schema — an external map editor writes it. Empty = fall back to
# $GPSR_WORLD_FILE, else GPSR's tasks/GPSR/world.toml, so one arena file serves
# every challenge and the teach_poses tool already feeds them all. Each challenge
# still falls back to its own *_POSE env var when the map lacks a name, so a box
# with no map file keeps working. See docs/MAP_LOCATIONS.md.
WALKIE_MAP_FILE = ""

[runtime]
# 1 = type instructions at a TTY instead of speaking (no mic).
DISABLE_LISTENING = "0"
# Input device for the microphone (STT). Empty = the system default input, which
# is often wrong on the robot (e.g. a 64-ch pipewire "default" that captures
# nothing) — the usual "STT hears nothing" cause. Set an index ("4") or a name
# substring ("fifine"); a name survives USB re-enumeration across reboots. List
# devices + measure the level with:  python -m interfaces.devices.microphone
WALKIE_MIC_DEVICE = ""

[people]
# Face/appearance person memory (perception.PeopleStore): two-modality re-ID
# over InsightFace + OSNet embeddings from walkie-ai-server. Used by the HRI
# task to remember guests; same single-process ChromaDB caveat as the other
# stores. Wipe by removing the PEOPLE_CHROMA_DIR / PEOPLE_FRAMES_DIR dirs below.
PEOPLE_CHROMA_DIR = "chroma_db_people"
PEOPLE_FRAMES_DIR = "people_frames"
# Face-only match gate: max cosine DISTANCE (1 - similarity) to accept.
FACE_MATCH_THRESHOLD = "0.4"
# Fused (face+attire) match gate: min fused SIMILARITY score to accept.
APPEARANCE_MATCH_THRESHOLD = "0.5"

[agent]
# History summarization (agents/core/agent.py middleware).
WALKIE_SUMMARIZE_AT_TOKENS = "6000"
WALKIE_SUMMARIZE_KEEP_MSGS = "12"

[robot]
# 1 = pause after each movement / arm action (debugging).
PAUSE_AFTER_WALK = "0"

[camera]
# Tilt-servo backlash correction (interfaces/devices/camera.py::camera_pose).
# The head's tilt servo has mechanical play, so the optical frame the TF tree
# reports is rotated slightly from where the camera actually points. These euler
# offsets (radians, in the camera OPTICAL frame) are composed into the camera
# pose as R @ R_offset right before every 3D lift, so they fix deprojected world
# points in both the walkie_graphs loop and the HRI/skills snapshot paths.
# Y is the tilt (up/down) axis on this mount — start there. Calibrate on the real
# robot: point at a known target, nudge until the lifted point lands on it.
WALKIE_CAMERA_TILT_OFFSET_X_RAD = "0.0"
WALKIE_CAMERA_TILT_OFFSET_Y_RAD = "0.0"
WALKIE_CAMERA_TILT_OFFSET_Z_RAD = "0.0"

[manipulation]
# Robot-wide grasp/arm knobs shared by every manipulation task (Pick and Place,
# Restaurant, ...). Read by tasks/manipulation.py. The grasp PLANNER is a stub
# (centroid + a fixed orientation), but the arm motion is real. CALIBRATE every
# orientation/offset below on the real robot before a competition run.
WALKIE_ARM = "left"                  # which arm group: "left" or "right"
WALKIE_ARM_FRAME = "base_footprint"  # arm planning frame: "base_footprint" or "map"
WALKIE_GRASP_APPROACH = "top_down"   # "top_down" (overhead) or "front" (horizontal)
# End-effector orientation (roll,pitch,yaw rad) per approach. Defaults are borrowed
# from the HRI reach/place poses on this robot — VERIFY on the arm for grasping.
WALKIE_GRASP_RPY_TOPDOWN = "-2.623,-0.033,-1.468"
WALKIE_GRASP_RPY_FRONT = "-0.8,0.0,-1.5708"
# Wrist orientation (base-frame roll,pitch,yaw rad) used by the GraspNet skill's
# point_at_object mode (tasks/skills/grasp.py::aim_forward_candidate): instead of
# GraspNet's often-IK-unsolvable wrist, point the gripper's approach axis (EE +z)
# straight along the robot heading. Default "0,1.5708,0" -> EE +z = base +x
# (horizontal, dead ahead). CALIBRATE on the arm if the gripper rolls wrong.
WALKIE_GRASP_POINT_RPY = "0,1.5708,0"
WALKIE_GRASP_Z_OFFSET_M = "0.0"      # vertical nudge added to the object centroid
WALKIE_PREGRASP_OFFSET_M = "0.10"    # pre-grasp standoff (above for top-down, back for front)
WALKIE_LIFT_HEIGHT_M = "0.15"        # how far to lift after grasping
WALKIE_CARRY_POSE = "standby"        # go_to_home preset to tuck the arm for nav

[skills]
# Arena-entry door detection (tasks/skills/door.py is_door_open / door_open_from_depth),
# the built-in is_open sensor for request_open_door. Reads the depth camera: the door
# is CLOSED when a near surface fills the central doorway region. CALIBRATE on-robot
# with `uv run python -m manual_tests.calibrate_door`.
# Robot stands ~0.5 m from the closed door, so the closed reading is ~0.5 m; 0.9 sits
# above that (robust "closed") and below the clear-arena reading once it opens.
WALKIE_DOOR_CLEAR_M = "0.9"           # median depth (m) below this in the centre = closed
WALKIE_DOOR_CENTER_FRAC = "0.4"      # central fraction of the frame to inspect (the doorway)
WALKIE_DOOR_MIN_VALID_FRAC = "0.5"   # min fraction of valid depth pixels to trust a "closed"
# request_open_door self-watch: ask once, then poll depth and walk in the moment the
# door reads clear (no spoken confirmation needed when the camera can see the doorway).
WALKIE_DOOR_POLL_SEC = "0.5"         # seconds between depth checks while waiting
WALKIE_DOOR_CONFIRM_READS = "2"      # consecutive open reads before going in (debounce)
WALKIE_DOOR_REPROMPT_SEC = "15"      # re-ask "please open the door" this often while waiting
WALKIE_DOOR_WAIT_SEC = "120"         # give up and proceed after this long; <= 0 = wait forever
# go_to_through_door: a partly-open door reads "open" but blocks nav; ask for it wider
# and pause this long for the human before retrying the drive (nav success = the signal).
WALKIE_DOOR_RETRY_PAUSE_SEC = "3"    # seconds to wait after asking, before retrying nav
WALKIE_DOOR_PROGRESS_EPS_M = "0.3"   # if the robot got >this much closer to goal between retries
                                     # it's driving THROUGH the door -> retry quietly, don't re-ask

WALKIE_MIC_DEBUG_DIR = "mic_recording"

[placement]
# Surface detection + object placement (tasks/skills/place.py, surface geometry in
# interfaces/perception/surfaces.py). The map frame is gravity-aligned (+Z up), so a
# horizontal surface is a constant-Z band — these knobs tune the height-clustering and
# the empty-space search. CALIBRATE the reach/footprint values on the real arm.
# Full-scene cloud lift (override the per-detection WALKIE_GRAPHS_* defaults).
WALKIE_PLACE_SCENE_VOXEL_M = "0.015"   # voxel size for the whole-scene cloud
WALKIE_PLACE_MAX_DEPTH_M = "3.0"       # drop points farther than this (stereo noise)
# Horizontal-surface detection.
WALKIE_SURFACE_Z_GAP_M = "0.04"        # split height bands at vertical gaps wider than this
WALKIE_SURFACE_MIN_POINTS = "150"      # drop surfaces with fewer points than this
WALKIE_SURFACE_XY_EPS_M = "0.05"       # DBSCAN eps splitting tables at the same height
WALKIE_SURFACE_XY_MIN_POINTS = "30"    # DBSCAN min points for an XY cluster
# Minimum usable flat area (m^2) a surface must cover to count — the true occupied
# area, not the bounding box, so an L-shape / sparse scatter with a big box is rejected.
# 0.05 m^2 ~= a 22x22 cm patch; raise it to ignore small clutter surfaces.
WALKIE_SURFACE_MIN_AREA_M2 = "0.05"    # drop surfaces below this real flat area
WALKIE_SURFACE_AREA_CELL_M = "0.05"    # grid resolution of the area estimate
WALKIE_SURFACE_NORMAL_Z_MIN = ""       # |n_z| gate (needs Open3D); empty = skip the gate
# Empty-space search + place geometry.
WALKIE_PLACE_FOOTPRINT_M = "0.12"      # object footprint (square side) when not recorded at pick
WALKIE_PLACE_CLEARANCE_M = "0.03"      # keep this clear around the placed object
WALKIE_PLACE_CELL_M = "0.04"           # occupancy grid resolution
WALKIE_PLACE_EDGE_MARGIN_M = "0.05"    # keep the object this far from the table edge
WALKIE_PLACE_Z_OFFSET_M = "0.02"       # extra clearance added above the reconstructed height
WALKIE_PLACE_FALLBACK_OFFSET_M = "0.05"  # grasp-to-surface offset to assume when none recorded
WALKIE_PLACE_STANDOFF_M = "0.10"       # pre-place / retreat height above the hover point
# The arm parks the object this far ABOVE the surface, then the precise torso lift
# lowers it straight down before releasing (the arm's cartesian descent at full reach
# is imprecise and drops the object from too high).
WALKIE_PLACE_LOWER_M = "0.08"          # hover height above the surface; lift lowers by this
WALKIE_PLACE_SETTLE_SEC = "0.6"        # wait after a lift move to let it settle
WALKIE_PLACE_MIN_Z_M = "0.70"          # don't place below this height (arm can't reach)
WALKIE_PLACE_MAX_REACH_XY_M = "0.75"   # abort if the spot is farther than this (planar)