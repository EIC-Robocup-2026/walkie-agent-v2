# walkie-agent-v2 config.
#
# This file holds nearly all configuration — tuning knobs plus the endpoints and
# transport that used to live in .env. None of it is secret, so it's safe to
# version-control. The ONLY things left in .env are the OpenRouter API key and
# its base URL (OPENROUTER_API_KEY / OPENROUTER_BASE_URL).
#
# Precedence (highest wins):
#   1. a real shell environment variable
#   2. a value in .env
#   3. a value here in config.toml
#   4. the hardcoded default in code
#
# So you can still override any of these from .env or the shell for a one-off
# run without editing this file. Values are written as the same strings the
# code's os.getenv() calls expect (e.g. "1"/"0" for flags, "" to disable).

[llm]
# 1 = use a local OpenAI-compatible LLM (LOCAL_BASE_URL/LOCAL_MODEL) instead of
# OpenRouter. The OpenRouter API key + base URL are the only things left in .env.
LLM_USE_LOCAL = "0"
WALKIE_MODEL = "anthropic/claude-sonnet-4.5"
WALKIE_TEMPERATURE = "0.5"
# Local LLM endpoint (OpenAI-compatible), used when LLM_USE_LOCAL=1.
LOCAL_BASE_URL = "http://10.0.0.210:8000/v1"
LOCAL_MODEL = "qwen3.5-9b"

[services]
# Remote AI inference server (walkie-ai-server): STT, TTS, object detection,
# image captioning, pose estimation, CLIP image-embed.
WALKIE_AI_BASE_URL = "http://10.0.0.213:5000"

[transport]
# walkie-sdk robot transport. ROS services over rosbridge (default), camera over
# zenoh. Force zenoh services only if you've shipped the perception/srv into
# zenoh_ros2_sdk. Port defaults: 9090 for rosbridge, 7447 for zenoh.
WALKIE_ROS_PROTOCOL = "rosbridge"
WALKIE_ROS_PORT = "9090"
# IP of the robot for the walkie-sdk transport (rosbridge + zenoh camera). Leave
# 127.0.0.1 when running on the robot itself; set to walkie's own LAN IP (e.g.
# 10.0.0.201) when running from a developer PC. Note: walkie is NOT the same
# machine as the AI server at WALKIE_AI_BASE_URL — they're separate boxes.
WALKIE_ROBOT_IP = "127.0.0.1"

[runtime]
# 1 = type instructions at a TTY instead of speaking (no mic).
DISABLE_LISTENING = "0"

[agent]
# History summarization (agents/core/agent.py middleware).
WALKIE_SUMMARIZE_AT_TOKENS = "6000"
WALKIE_SUMMARIZE_KEEP_MSGS = "12"

[robot]
# 1 = pause after each movement / arm action (debugging).
PAUSE_AFTER_WALK = "0"

[storage]
# Legacy explore-stage WalkieVectorDB and its object-crop frames.
CHROMA_DIR = "chroma_db"
OBJECT_FRAMES_DIR = "object_frames"
PERCEPTION_PATH = "perception.json"

[explore]
# Legacy explore stage thresholds (WalkieVectorDB → chroma_db).
EXPLORE_INTERVAL_SEC = "1.0"
EXPLORE_MIN_SIGHTINGS = "5"
EXPLORE_DEDUP_RADIUS_M = "1.0"
EXPLORE_MIN_CONF = "0.6"

[perception]
# Ready-stage live snapshot written to perception.json. Perception runs the single
# per-frame detection (open-vocab, masked) and feeds each frame to the scene graph; the
# graph returns per-object world centroids -> position_3d and captions. So object 3D
# positions + captions require WALKIE_GRAPHS_ENABLED=1 (the graph owns that work now).
PERCEPTION_INTERVAL_SEC = "5.0"
PERCEPTION_STALE_SEC = "10"
# DEPRECATED — captioning now lives in the graph's ingest_frame, governed by
# WALKIE_GRAPHS_CAPTION_CLASSES (defaults to the interested list). These two are unused.
PERCEPTION_CAPTION_OBJECTS = "0"
PERCEPTION_CAPTION_FILTER = ""
# DEPRECATED — the old bboxes_to_positions ROS lift is gone; position_3d now comes from
# mask deprojection in the graph. Unused (kept for config/signature stability).
PERCEPTION_POSITION_TIMEOUT_SEC = "5.0"

[scene]
# CLIP long-term semantic memory (ready stage). Embeds detections into
# chroma_db_scene; powers find_object.
SCENE_PERCEPTION_ENABLED = "1"
# Embedding backend:
#   local  = run CLIP in-process (no walkie-ai-server dependency, crash-proof,
#            GPU-accelerated). Needs `uv sync --extra clip`.
#   remote = call walkie-ai-server's /image-embed route.
SCENE_EMBED_BACKEND = "local"
# Local-backend model (must match what built any existing data) + device/dtype.
# Device empty = auto (CUDA if present). FP16 "auto" = half precision on CUDA.
SCENE_CHROMA_DIR = "chroma_db_scene"
SCENE_FRAMES_DIR = "frames"
# Capture cadence. Raised from 5s → 8s so the store isn't churned so often
# (one tick already catalogues every visible object). Lower for faster updates.
SCENE_PERCEPTION_INTERVAL_SEC = "8.0"
SCENE_MIN_CONF = "0.0"
# Comma-separated classes to KEEP OUT of long-term memory. Moving objects
# (people) can't be position-deduped — they spawn a new record every tick — so
# they don't belong in a spatial catalogue. Filtered before lift/caption/embed,
# so excluded classes cost nothing. Empty = store everything.
SCENE_EXCLUDE_CLASSES = "person"
# Per-object captions describe each object separately (~6s each) but make the
# caption text search much sharper. 0 = one cheap whole-frame caption.
SCENE_CAPTION_PER_OBJECT = "1"
# Refresh the archived thumbnail on every re-sighting (overwrite in place).
SCENE_FRAME_REFRESH_ON_UPDATE = "1"
# Archive the object crop (bbox region) instead of the whole camera frame, so
# the viewer thumbnail shows the object itself. 0 = keep full frames.
SCENE_FRAME_CROP = "1"
# Padding around the bbox when cropping (fraction of bbox size; 0.12 = 12%).
SCENE_FRAME_CROP_MARGIN = "0.12"
# Rebuild the caption text index for pre-existing records on startup. Set "1"
# once after upgrading (or after collecting data with an older build), then "0".
SCENE_REINDEX_CAPTIONS = "0"

[scene.dedup]
# Merge gates (perception/dedup.py). RADIUS/TIGHT must stay ABOVE per-object
# position jitter from get_3d_poses (~5-15cm) or the SAME object re-inserts as
# duplicates. If one object splits into many records, raise these. (These were
# 0.1/0.08 — below the jitter band — which is exactly what caused the duplicate
# spam; 0.4/0.2 keeps re-sightings inside the candidate net.)
SCENE_DEDUP_RADIUS_M = "0.4"
SCENE_DEDUP_TIGHT_M = "0.2"
# Embedding cosine merge gates. HIGH merges on visual similarity; raise toward
# 1.0 to merge less aggressively.
SCENE_EMB_SIM_HIGH = "0.85"
SCENE_EMB_SIM_LOW = "0.65"
# Visual dedup: also pull the top-K same-class nearest neighbours by image
# embedding into the candidate set on upsert, *regardless of position*. Without
# this the sim≥HIGH gate is capped by RADIUS, so a confident re-sighting whose
# 3D position drifted (or fell back to the robot pose) duplicates. 0 = spatial
# dedup only (one extra vector query per detection when > 0).
SCENE_DEDUP_VISUAL_K = "5"

[scene.position]
# lift  = SDK depth+TF per-object 3D position (distinct objects → distinct
#         positions). Needs rosbridge + get_3d_poses.
# robot = robot's own odom pose for every object (coarse but robust).
SCENE_POSITION_SOURCE = "lift"
# Depth-lift timeout for the scene catalogue. The SDK logs "[Tools] Service call
# timed out after Ns" when the ROS-3D node is slower than this; on timeout the
# whole tick is dropped (or robot-pose-stamped if the fallback below is on).
# Raise if you see frequent timeouts in the log.
SCENE_POSITION_TIMEOUT_SEC = "5.0"
# When a per-object lift fails, stamping the robot's own pose stores "where the
# robot stood", not where the object is — navigating back there goes to nothing.
# 0 (default) drops the detection so only real 3D lifts enter the catalogue;
# 1 re-enables the robot-pose fallback (only sane once get_3d_poses is solid).
SCENE_POSITION_FALLBACK_POSE = "0"
# Sanity gate on lifted positions: if depth-lift reports an object farther than
# this from the robot, treat it as a sensor outlier (bbox center sampled a far
# wall behind the object, shiny/transparent surface, etc.). With the robot-pose
# fallback on it's stamped with the robot pose; with the fallback off (default)
# it's dropped. Tune to your camera's reliable depth range (ZED2 mini: ~3-5m,
# ZED2/2i: ~7-10m). Empty/0 = no gate (lifted value always trusted).
SCENE_MAX_LIFT_DISTANCE_M = ""

[scene.query]
# Agent lookups (find_object / find_object_from_memory) drop matches whose
# stored position_conf is below this floor, so "where is X?" only returns
# places the robot can actually be sent. 0 = no filter (return every match).
SCENE_QUERY_MIN_CONF = "0.25"

[scene.prune]
# Eviction so removed objects leave the store. TTL evicts records not re-seen
# for N seconds; RADIUS gates the sweep to the robot's vicinity (roaming-safe;
# 0/empty = global). 0/empty TTL disables. MAX_RECORDS is an optional global cap.
#
# TTL is DISABLED: the spatial gate is keyed on robot (x,y) only and ignores
# camera direction, so merely tilting the head down (or turning away) stops a
# nearby object being re-seen and the TTL sweep would wrongly delete it even
# though it's still there. For a long-term spatial catalogue, capacity is the
# right bound instead: keep the newest MAX_RECORDS by last_seen_ts. Re-sightings
# still update position/last_seen via dedup, so the cap evicts the genuinely
# oldest, never the merely out-of-frame. (FOV-gated TTL would need camera
# extrinsics the SDK doesn't expose yet — get_position() is planar x,y only.)
SCENE_PRUNE_TTL_SEC = ""
SCENE_PRUNE_RADIUS_M = "2.5"
SCENE_PRUNE_INTERVAL_SEC = "10"
SCENE_PRUNE_MAX_RECORDS = "500"

[viewer]
# Read-only ChromaDB web UI (tools.chroma_viewer).
# Auto-start the viewer in-process alongside `python main.py` (1 = on). Because
# it runs in the SAME process as the robot, both share one ChromaDB backend, so
# browsing is fully LIVE and safe — no snapshot, no DB corruption. Set 0 to run
# the robot without it (then start it separately with `python -m tools.chroma_viewer`).
CHROMA_VIEWER_AUTOSTART = "1"
CHROMA_VIEWER_HOST = "0.0.0.0"
CHROMA_VIEWER_DIRS = "chroma_db,chroma_db_scene"
CHROMA_VIEWER_PORT = "8500"
# Initial browser auto-refresh (s); 0 = off. Header dropdown overrides per-browser.
CHROMA_VIEWER_REFRESH_SEC = "5"
# Downscaled-thumbnail cache for the /frame route (large source frames render
# as small JPEGs in tables/galleries instead of failing to load).
CHROMA_VIEWER_THUMB_CACHE = ".thumb_cache"

[graphs]
# walkie_graphs: open-vocabulary 3D scene-graph spatial memory. Lifts masked
# detections to 3D world points, fuses them into object nodes, and derives
# distance-based relations. The database sub-agent queries this store. Self-contained:
# its own Chroma dir, point-cloud sidecars, and edge file (NOT the legacy chroma_db).
# In production, perception drives ingestion (graphs.ingest_frame) per detected frame —
# the WalkieGraphsService thread only self-drives in manual_tests/test_graphs_live.py.
# ENABLED now gates whether perception feeds the graph (off => no 3D positions/captions
# in perception.json either, since the graph owns that work).
WALKIE_GRAPHS_ENABLED = "1"
WALKIE_GRAPHS_PERF="1"
# Only used by the standalone WalkieGraphsService thread (manual tests). In production
# the cadence is perception's PERCEPTION_INTERVAL_SEC.
WALKIE_GRAPHS_INTERVAL_SEC = "3.0"
# "Interested classes": one comma-separated list that drives the whole module —
# passed as open-vocab prompts to the detection server, and the scope of what
# enters the graph. Empty = detect/keep everything the detector emits. Class names
# may contain spaces (split on commas). Grouped here by category for readability.


# WALKIE_GRAPHS_INTERESTED_CLASSES = "chair,stool,shirt,sponge,bowl,cup,fork,knife,plate,spoon,coffee creamer,coke,ice tea,milk,orange juice,red bull,water bottle,bread,cornflakes,instant noodles,potato,tomato soup,apple,avocado,lemon,orange,chips,cookies,gum,mixed nuts,pringles,hand cream,soap,toothpaste,dish rack,shelf,monitor,bed,pillow"


# Classes to always drop before lift/embed/store. Moving objects (people) can't
# be position-deduped, so they'd spawn a node every tick — keep them out.
WALKIE_GRAPHS_EXCLUDE_CLASSES = "person"
# Classes to caption (server image-caption). Empty = same as interested classes.
WALKIE_GRAPHS_CAPTION_CLASSES = "shirt"
# Live 3D visualization backend: none | rerun. rerun needs `uv sync --extra graphs`.
WALKIE_GRAPHS_VIZ = "rerun"
# What to draw in the Rerun viewer. Point clouds are always shown.
WALKIE_GRAPHS_VIZ_BOXES = "0"   # 0 = hide per-object bounding boxes
# Per-object class-name labels, independent of boxes. With boxes ON the label
# rides on the box; with boxes OFF the label is anchored to the object centroid.
WALKIE_GRAPHS_VIZ_LABELS = "1"  # 0 = hide per-object class-name labels
WALKIE_GRAPHS_VIZ_ROBOT = "1"   # 0 = hide the robot position + heading marker
WALKIE_GRAPHS_VIZ_CAMERA = "1"  # 0 = hide the camera position + look-direction marker
# Rerun viewer reachability. 0 = spawn a native window ON THE ROBOT (needs a
# display, local only). 1 = serve a browser viewer + gRPC data stream bound to
# 0.0.0.0 so any computer on the LAN can watch (prints the URL on startup).
#
# IMPORTANT: serving binds 0.0.0.0, but the robot's HOST FIREWALL (ufw/iptables,
# usually default-deny incoming — which is why only SSH gets through) will silently
# DROP these ports, so a remote machine sees a connection *timeout*. Open BOTH ports
# on the robot (the browser loads the page on WEB_PORT and streams data on
# GRPC_PORT — both are required):
#     sudo ufw allow 9090/tcp && sudo ufw allow 9876/tcp
# (use the actual WEB_PORT/GRPC_PORT below if you change them).
WALKIE_GRAPHS_RERUN_SERVE = "1"
WALKIE_GRAPHS_RERUN_WEB_PORT = "8008"
WALKIE_GRAPHS_RERUN_GRPC_PORT = "9876"
# Host/IP that REMOTE browsers use to reach the robot (blank = auto-detect LAN IP).
WALKIE_GRAPHS_RERUN_HOST = ""
# CORS origins allowed to reach the gRPC data server (the browser page is served on
# a different port). "*" = allow any — fine on a trusted LAN.
WALKIE_GRAPHS_RERUN_CORS = "*"

[graphs.camera]
# Camera calibration + pose come straight from the walkie-sdk — no manual tuning.
# Intrinsics: camera.get_intrinsics() reads the ZED's CameraInfo (cached; applies to
#   the registered depth too), scaled to the depth resolution if they differ.
# Pose: transform.lookup(MAP_FRAME, CAMERA_FRAME) with the camera OPTICAL frame returns
#   a pose whose rotation maps camera-optical points straight into the map (lift, head
#   tilt, and every mount offset already baked in by the TF tree). The optical frame's
#   axes (x right, y down, z forward) match the pinhole back-projection, so no axis
#   conversion or manual composition is needed.
WALKIE_GRAPHS_TF_MAP_FRAME = "map"
WALKIE_GRAPHS_TF_CAMERA_FRAME = "zed_head_left_camera_frame_optical"
WALKIE_GRAPHS_TF_TIMEOUT_SEC = "1.0"

[graphs.fusion]
# Incremental dedup. A detection MERGES into an existing same-class node when its
# CLIP image-emb cosine >= SIM_HIGH, or (>= SIM_LOW and centroid within TIGHT_M);
# else it INSERTs. Candidates = same-class nodes within RADIUS_M plus the top
# DEDUP_VISUAL_K nearest by image-emb regardless of position (drift-proof).
# RADIUS/TIGHT must stay above per-object 3D jitter (~5-15cm) or objects re-insert.
WALKIE_GRAPHS_DEDUP_RADIUS_M = "0.4"
WALKIE_GRAPHS_DEDUP_TIGHT_M = "0.2"
WALKIE_GRAPHS_SIM_HIGH = "0.85"
WALKIE_GRAPHS_SIM_LOW = "0.65"
WALKIE_GRAPHS_DEDUP_VISUAL_K = "5"
# Point-cloud handling: voxel size for downsampling merged clouds (m), hard cap
# on points per object, and the minimum valid depth points to accept a detection.
WALKIE_GRAPHS_VOXEL_M = "0.02"
WALKIE_GRAPHS_MAX_POINTS_PER_OBJ = "2000"
WALKIE_GRAPHS_MIN_POINTS = "30"
# Minimum detector confidence to accept a detection. Dropped early (before
# lift/embed/caption), alongside the class scope and MIN_POINTS checks. 0.0 = keep all.
WALKIE_GRAPHS_CONFIDENCE_THRESHOLD = "0.3"
# --- ConceptGraphs-style association (primary path; the SIM_HIGH/LOW cascade above
# is now the fallback used only when point clouds don't overlap). A detection MERGES
# into the highest-scoring same-class node whose score
#   phi = W_GEO * nn_ratio + W_SEM * (0.5*cos + 0.5)
# clears SIM_THRESHOLD. nn_ratio = fraction of the detection's points within NN_VOXEL_M
# of the node's cloud (CG's delta_nn = 2.5cm); both terms are in [0,1] so SIM_THRESHOLD
# lives in [0,2] (1.1 ~ strong geometric overlap + agreeing CLIP). With weights 1/1 a
# pure-visual match tops out at 1.0 < 1.1, so this path only fires on real overlap.
WALKIE_GRAPHS_SIM_THRESHOLD = "1.1"
WALKIE_GRAPHS_W_GEO = "1.0"
WALKIE_GRAPHS_W_SEM = "1.0"
WALKIE_GRAPHS_NN_VOXEL_M = "0.025"
# Cross-class association (ConceptGraphs matches with NO class constraint). The
# detector's labels flip-flop ("cup" one frame, "mug" the next), so a same-class-only
# matcher stores one object twice. A different-class candidate may merge when its
# score clears this STRICTER gate (needs ~full overlap AND agreeing CLIP — with
# weights 1/1, 1.5 means nn_ratio + phi_sem >= 1.5). 0 = same-class only.
WALKIE_GRAPHS_CROSS_CLASS_SIM_THRESHOLD = "1.5"
# Depth "flying pixel" cleanup — the points that smear off an object's silhouette into
# a shadow because a boundary depth pixel mixes the object with the background behind it.
# Removed at the source (before back-projection), where the discontinuity is visible:
#   MASK_ERODE_PX     — shrink each mask inward this many px, dropping the unreliable rim.
#   DEPTH_EDGE_THRESH — drop pixels next to a depth jump bigger than this (metres); the
#                       flying pixels sit exactly on these jumps. 0 disables either.
WALKIE_GRAPHS_MASK_ERODE_PX = "2"
WALKIE_GRAPHS_DEPTH_EDGE_THRESH_M = "0.05"
# DBSCAN denoising of each detection's cloud (largest cluster) before it enters the
# graph — strips any residual mask-edge depth bleed that would inflate AABBs. The edge
# filters above remove most of it at the source; DBSCAN is the 3D backstop. 1 = on.
WALKIE_GRAPHS_DBSCAN_ENABLED = "1"
WALKIE_GRAPHS_DBSCAN_EPS = "0.05"
WALKIE_GRAPHS_DBSCAN_MIN_POINTS = "10"
# Detection-time rejects (CG filter_gobs): drop a box covering more than this fraction
# of the frame (walls/floor/background), and masks smaller than this many pixels.
# 1.0 / 0 disable each. 0.9 keeps real objects while dropping whole-frame misfires.
WALKIE_GRAPHS_MAX_BBOX_AREA_RATIO = "0.9"
WALKIE_GRAPHS_MIN_MASK_AREA_PX = "64"
# Subtract a contained detection's mask from its container's before deprojection
# (CG mask_subtract_contained): keeps the mug's pixels out of the table's cloud and
# crop, so containers don't absorb the objects resting on/in them. 1 = on.
WALKIE_GRAPHS_MASK_SUBTRACT = "1"
# Context margin (px) around the bbox for the CLIP/caption crop (CG pads 20).
WALKIE_GRAPHS_CROP_MARGIN_PX = "20"

[graphs.maintenance]
# Periodic ConceptGraphs post-processing, each on its own cadence (in ingest ticks,
# staggered so no two collide). 0 disables a pass.
# denoise_nodes: re-DBSCAN nodes whose cloud changed, keeping the largest cluster
#   UNLESS that would drop more than 1 - DENOISE_KEEP_MIN_FRAC of the points (a big
#   drop means a legitimately spread object, e.g. a table, not noise → left intact).
WALKIE_GRAPHS_DENOISE_EVERY_N = "20"
WALKIE_GRAPHS_DENOISE_KEEP_MIN_FRAC = "0.5"
# merge_overlapping_nodes: fuse two nodes within MERGE_RADIUS_M whose clouds overlap
# above MERGE_OVERLAP_THRESH (symmetric nn_ratio) and whose CLIP embeddings agree
# above MERGE_VISUAL_SIM_THRESH — recovers an object first mapped from two sides as
# two nodes. Same-class pairs always considered; different-class pairs only when
# CROSS_CLASS_SIM_THRESHOLD > 0 (and they additionally REQUIRE the CLIP gate — pure
# geometry never overrides the labels). (TEXT_SIM kept for parity; unused without
# stored caption embeddings.)
WALKIE_GRAPHS_MERGE_EVERY_N = "20"
WALKIE_GRAPHS_MERGE_OVERLAP_THRESH = "0.7"
WALKIE_GRAPHS_MERGE_VISUAL_SIM_THRESH = "0.7"
WALKIE_GRAPHS_MERGE_TEXT_SIM_THRESH = "0.7"
WALKIE_GRAPHS_MERGE_RADIUS_M = "0.5"
# Node precision (CG obj_min_detections): an object must be seen MIN_OBS_CONFIRM times
# before it counts. With REQUIRE_CONFIRMATION=1, provisional (under-seen) nodes are
# HIDDEN from queries/description (non-destructive — a re-sighting promotes them; the
# viewer and count() still see them). GHOST_GRACE_SEC>0 additionally DELETES provisional
# nodes unseen that long (0 = never delete, just hide).
WALKIE_GRAPHS_MIN_OBS_CONFIRM = "2"
WALKIE_GRAPHS_REQUIRE_CONFIRMATION = "1"
WALKIE_GRAPHS_GHOST_EVERY_N = "20"
WALKIE_GRAPHS_GHOST_GRACE_SEC = "0"

[graphs.semantic]
# Optional LLM layer (ConceptGraphs node captions + scene-graph edges). OFF by default
# (the EVERY_N cadences are 0); enable by setting them > 0. All run on the wired chat
# model, best-effort, never blocking the perception loop.
# BEST_VIEWS: keep this many highest-confidence crops per object (feeds image-grounded
# caption refinement). Cheap to store; the LLM compute below is what's gated off.
WALKIE_GRAPHS_BEST_VIEWS = "10"
# refine_captions: every N ticks, summarize a node's accumulated view captions into one
# coherent caption (LIMIT nodes/pass, most-recently-changed first). USE_IMAGES=1 also
# sends the best crops to a multimodal model (costs more); 0 = text-only summary.
WALKIE_GRAPHS_CAPTION_REFINE_EVERY_N = "0"
WALKIE_GRAPHS_CAPTION_REFINE_LIMIT = "8"
WALKIE_GRAPHS_CAPTION_REFINE_USE_IMAGES = "0"
# infer_edges_llm: every N ticks, label spatial relations over an MST of nearby objects
# and store them as separate "llm:<label>" edges (geometric edges stay primary).
WALKIE_GRAPHS_LLM_EDGES_EVERY_N = "0"

[graphs.relations]
# Geometric (distance-based) edges, recomputed every RELATION_EVERY_N ingest ticks
# (in production a tick is one perception frame, so ~RELATION_EVERY_N *
# PERCEPTION_INTERVAL_SEC seconds) over
# pairs whose centroids are within RELATION_MAX_DIST. near: centroid <= NEAR_M.
# on/above: XY-AABB-IoU >= XY_OVERLAP_MIN and a.zmin ~ b.zmax within Z_TOL (gap
# <= ON_GAP => "on", else "above"). inside: 3D AABB containment within CONTAIN_TOL.
WALKIE_GRAPHS_RELATION_MAX_DIST = "1.0"
WALKIE_GRAPHS_NEAR_M = "0.6"
WALKIE_GRAPHS_XY_OVERLAP_MIN = "0.15"
WALKIE_GRAPHS_Z_TOL = "0.05"
WALKIE_GRAPHS_ON_GAP = "0.08"
WALKIE_GRAPHS_CONTAIN_TOL = "0.02"
WALKIE_GRAPHS_RELATION_EVERY_N = "5"

[graphs.store]
# Self-contained storage (kept OUT of CHROMA_VIEWER_DIRS on purpose). Nodes in a
# Chroma collection; per-object point clouds as .npz sidecars; edges as JSON;
# thumbnails as object-crop JPEGs. Capacity cap evicts the oldest by last_seen.
WALKIE_GRAPHS_CHROMA_DIR = "chroma_db_graph"
WALKIE_GRAPHS_PCDS_DIR = "graph_pcds"
WALKIE_GRAPHS_THUMBS_DIR = "graph_thumbs"
WALKIE_GRAPHS_EDGES_PATH = "graph_edges.json"
WALKIE_GRAPHS_PRUNE_MAX_RECORDS = "500"
