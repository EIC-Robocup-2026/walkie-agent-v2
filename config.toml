# walkie-agent-v2 config.
#
# This file holds nearly all configuration — tuning knobs plus the endpoints and
# transport that used to live in .env. None of it is secret, so it's safe to
# version-control. The ONLY things left in .env are the OpenRouter API key and
# its base URL (OPENROUTER_API_KEY / OPENROUTER_BASE_URL).
#
# Precedence (highest wins):
#   1. a real shell environment variable
#   2. a value in .env
#   3. a value here in config.toml
#   4. the hardcoded default in code
#
# So you can still override any of these from .env or the shell for a one-off
# run without editing this file. Values are written as the same strings the
# code's os.getenv() calls expect (e.g. "1"/"0" for flags, "" to disable).
#
# Competition tasks keep their own config in tasks/<NAME>/config.toml, loaded
# BEFORE this file (tasks.common.load_task_config) — so a task file both holds
# its task-specific keys and may override any global key here for that task.

[llm]
# 1 = use a local OpenAI-compatible LLM (LOCAL_BASE_URL/LOCAL_MODEL) instead of
# OpenRouter. The OpenRouter API key + base URL are the only things left in .env.
LLM_USE_LOCAL = "1"
WALKIE_MODEL = "google/gemini-3-flash-preview:nitro"
WALKIE_TEMPERATURE = "0.5"
# Local LLM endpoint (OpenAI-compatible), used when LLM_USE_LOCAL=1.
LOCAL_BASE_URL = "http://10.0.0.202:8000/v1"
LOCAL_MODEL = "qwen3.5-9b"

[services]
# Remote AI inference server (walkie-ai-server): STT, TTS, object detection,
# image captioning, pose estimation, CLIP image-embed.
WALKIE_AI_BASE_URL = "http://10.0.0.202:5000"

[transport]
# walkie-sdk robot transport. ROS services over rosbridge (default), camera over
# zenoh. Force zenoh services only if you've shipped the perception/srv into
# zenoh_ros2_sdk. Port defaults: 9090 for rosbridge, 7447 for zenoh.
WALKIE_ROS_PROTOCOL = "hybrid"
WALKIE_ROS_PORT = "9090"
# IP of the robot for the walkie-sdk transport (rosbridge + zenoh camera). Leave
# 127.0.0.1 when running on the robot itself; set to walkie's own LAN IP (e.g.
# 10.0.0.201) when running from a developer PC. Note: walkie is NOT the same
# machine as the AI server at WALKIE_AI_BASE_URL — they're separate boxes.
WALKIE_ROBOT_IP = "127.0.0.1"

[map]
# Shared named-location ("map") file every challenge drives to (rooms + locations
# with pose=[x,y,heading_rad], read by tasks/skills/locations.py; GPSR also reads
# its object/name/gesture vocab from the same file). This is the world.toml schema
# — the walkie-map-editor app (EIC-Robocup-2026/walkie-map-editor) exports it.
#
# GPSR_WORLD_FILE is the canonical knob: it is the ONE var BOTH resolvers honour
# (tasks/skills/locations.py AND tasks/GPSR/world.py::load_world), so it covers all
# FIVE challenges. Leave empty to fall back to the sibling tasks/GPSR/world.toml —
# drop the editor's output there for zero-config — or set it to that file's path.
GPSR_WORLD_FILE = ""
#
# WALKIE_MAP_FILE overrides the map for the four location-based challenges
# (PnP / Restaurant / HRI / Laundry) ONLY. GPSR's load_world() does NOT read it, so
# setting this alone leaves GPSR on the stale sibling file — prefer GPSR_WORLD_FILE
# above. resolve_pose order: $WALKIE_MAP_FILE -> $GPSR_WORLD_FILE -> sibling. Each
# challenge still falls back to its own *_POSE env var when the map lacks a name, so
# a box with no map file keeps working. See docs/MAP_LOCATIONS.md.
WALKIE_MAP_FILE = ""

[runtime]
# 1 = type instructions at a TTY instead of speaking (no mic).
DISABLE_LISTENING = "0"
# Input device for the microphone (STT). Empty = the system default input, which
# is often wrong on the robot (e.g. a 64-ch pipewire "default" that captures
# nothing) — the usual "STT hears nothing" cause. Set an index ("4") or a name
# substring ("fifine"); a name survives USB re-enumeration across reboots. List
# devices + measure the level with:  python -m interfaces.devices.microphone
WALKIE_MIC_DEVICE = ""
# Microphone input buffering (seconds). PortAudio's default ('high') buffer is
# only ~one block (~35ms) — too little to ride out a CPU/GIL stall from the
# walkie_graphs perception loop while the mic is recording, so captured audio is
# dropped and the recording comes back choppy/with dropouts. This forces a deeper
# input buffer that absorbs those stalls; the added latency is harmless for
# VAD-gated capture (min-silence is already ~1s). Empty = PortAudio default.
# Each record prints a [mic-diag] line — if it still shows overflow_blocks>0,
# raise toward 0.5; if even that isn't enough, the callback needs decoupling.
WALKIE_MIC_INPUT_LATENCY_S = "0.2"
# Save every record_until_silence capture to this dir as a timestamped WAV +
# print its duration/peak — turns "STT heard nothing" into a one-glance silent-vs
# -healthy check. Empty = off. Pairs with the [mic-diag] line above.
WALKIE_MIC_DEBUG_DIR = "mic_recording"

[people]
# Face/appearance person memory (perception.PeopleStore): two-modality re-ID
# over InsightFace + OSNet embeddings from walkie-ai-server. Used by the HRI
# task to remember guests; same single-process ChromaDB caveat as the other
# stores. Wipe by removing the PEOPLE_CHROMA_DIR / PEOPLE_FRAMES_DIR dirs below.
PEOPLE_CHROMA_DIR = "chroma_db_people"
PEOPLE_FRAMES_DIR = "people_frames"
# Face-only match gate: max cosine DISTANCE (1 - similarity) to accept.
FACE_MATCH_THRESHOLD = "0.4"
# Fused (face+attire) match gate: min fused SIMILARITY score to accept.
APPEARANCE_MATCH_THRESHOLD = "0.5"

[agent]
# History summarization (agents/core/agent.py middleware).
WALKIE_SUMMARIZE_AT_TOKENS = "6000"
WALKIE_SUMMARIZE_KEEP_MSGS = "12"

[vision]
# Vision sub-agent detection (agents/vision_agent/). The robot used to "not see" an
# object the arm could grasp because the vision tool ran the open-vocab detector with
# no prompts and no confidence floor. `look_for_object(query)` now mirrors the arm's
# grasp detector — descriptor expansion + CLIP rerank against the specific target —
# so "what the arm can grasp" and "what the robot says it sees" agree.
# Minimum detector confidence to count a box (drops spurious low-score boxes for
# absent classes). Mirrors WALKIE_GRASP locate's 0.2 floor. "0" keeps every box.
VISION_DETECT_MIN_CONFIDENCE = "0.2"
# CLIP cosine floor for the rerank (drop boxes scoring below this against the target).
# "0.0" = pure rerank, reject nothing (raw CLIP cosines on small crops are compressed;
# a high floor on UNTUNED CLIP silently rejects the real target). RAISE only after
# on-robot tuning. Mirrors WALKIE_GRASP_CLIP_SIM_THRESHOLD.
VISION_CLIP_SIM_FLOOR = "0.0"
# CLIP text-query template ("{t}" = target); "a photo of {t}" beats a bare brand
# string in CLIP zero-shot. Mirrors WALKIE_GRASP_CLIP_QUERY_TMPL.
VISION_CLIP_QUERY_TMPL = "a photo of {t}"

[robot]
# 1 = pause after each movement / arm action (debugging).
PAUSE_AFTER_WALK = "0"

[camera]
# Tilt-servo backlash correction (interfaces/devices/camera.py::camera_pose).
# The head's tilt servo has mechanical play, so the optical frame the TF tree
# reports is rotated slightly from where the camera actually points. These euler
# offsets (radians, in the camera OPTICAL frame) are composed into the camera
# pose as R @ R_offset right before every 3D lift, so they fix deprojected world
# points in both the walkie_graphs loop and the HRI/skills snapshot paths.
# Y is the tilt (up/down) axis on this mount — start there. Calibrate on the real
# robot: point at a known target, nudge until the lifted point lands on it.
WALKIE_CAMERA_TILT_OFFSET_X_RAD = "0.0"
WALKIE_CAMERA_TILT_OFFSET_Y_RAD = "0.0"
WALKIE_CAMERA_TILT_OFFSET_Z_RAD = "0.0"

[manipulation]
# Robot-wide grasp/arm knobs shared by every manipulation task (Pick and Place,
# Restaurant, ...). Read by tasks/manipulation.py. The grasp PLANNER is a stub
# (centroid + a fixed orientation), but the arm motion is real. CALIBRATE every
# orientation/offset below on the real robot before a competition run.
WALKIE_ARM = "left"                  # which arm group: "left" or "right"
WALKIE_ARM_FRAME = "base_footprint"  # arm planning frame: "base_footprint" or "map"
WALKIE_GRASP_APPROACH = "top_down"   # "top_down" (overhead) or "front" (horizontal)
# End-effector orientation (roll,pitch,yaw rad) per approach. Defaults are borrowed
# from the HRI reach/place poses on this robot — VERIFY on the arm for grasping.
WALKIE_GRASP_RPY_TOPDOWN = "-2.623,-0.033,-1.468"
WALKIE_GRASP_RPY_FRONT = "-0.8,0.0,-1.5708"
# Wrist orientation (base-frame roll,pitch,yaw rad) used by the GraspNet skill's
# point_at_object mode (tasks/skills/grasp.py::aim_forward_candidate): instead of
# GraspNet's often-IK-unsolvable wrist, point the gripper's approach axis (EE +z)
# straight along the robot heading. Default "0,1.5708,0" -> EE +z = base +x
# (horizontal, dead ahead). CALIBRATE on the arm if the gripper rolls wrong.
WALKIE_GRASP_POINT_RPY = "0,1.5708,0"
WALKIE_GRASP_Z_OFFSET_M = "0.0"      # vertical nudge added to the object centroid
WALKIE_PREGRASP_OFFSET_M = "0.10"    # pre-grasp standoff (above for top-down, back for front)
WALKIE_LIFT_HEIGHT_M = "0.15"        # how far to lift after grasping
WALKIE_CARRY_POSE = "home"           # go_to_home preset to tuck the arm for nav while carrying. "home" not "standby": standby yaws the shoulder out (j1=0.65) + bends the elbow up (j4=2.08), so the elbow sticks out sideways and clips door frames/walls in transit; "home" keeps the arms in (j1=0.26, near-straight elbow), narrower. Valid both_arms_lift poses: home, standby, hands_up.
# GraspNet skill (tasks/skills/grasp.py) multi-tilt fused planning: before the final
# grasp, take 2 snapshots at these head tilts (rad, +down = look down), dedup the object
# across the two views and fuse their clouds into one denser cloud for a single GraspNet
# inference. Shallow angles (below look_at_object's 0.436-rad clamp) suit table-top cans.
WALKIE_GRASP_MULTI_TILT = "0"        # enable the 2-snapshot fused grasp plan
WALKIE_GRASP_TILT_A = "0.2"          # first head tilt (rad) for the fused grasp snapshots
WALKIE_GRASP_TILT_B = "0.35"         # second head tilt (rad)
WALKIE_GRASP_TILT_SETTLE_SEC = "0.4" # wait after each head tilt before capturing
# Initial-locate head aim (pick_object): tilt the head DOWN to this angle (rad, +down)
# BEFORE the first object detection. That first locate has no position estimate yet, so
# it snapshots at whatever angle the head arrived at (look_at_object only tracks once
# there IS an estimate) — often too level to see a table-top object -> "no detection".
# Subsequent locates track the object via look_at_object, which itself looks down AT LEAST
# 0.436rad (its floor) — so keep this >= that or the first search looks up relative to the
# re-locates. "0" = don't force a tilt. 0.6rad (~34deg) looks well down onto a table from the
# arrival standoff; raise toward the 1.047rad (pi/3) head limit for a lower/closer surface.
WALKIE_GRASP_LOCATE_TILT = "0.6"
WALKIE_GRASP_DEDUP_RADIUS_M = "0.10" # two views are the same object if centroids within this
WALKIE_GRASP_MERGE_VOXEL_M = "0.003" # voxel size when fusing the two viewpoints' clouds
# Same-angle fusion (used by pick_object's grasp plan, _grasp_cloud_multi_snap): take N
# snapshots WITHOUT moving the head and fuse their object clouds before one GraspNet
# inference. The head holds still, so there's no cross-pose error (unlike MULTI_TILT);
# the fuse averages per-voxel depth noise and fills single-frame dropouts. "1" disables
# it (falls back to best-of-N). Reuses DEDUP_RADIUS_M / MERGE_VOXEL_M above.
WALKIE_GRASP_FUSE_SNAPS = "1"        # snapshots fused per grasp plan ("1" = best-of-N instead)
WALKIE_GRASP_FUSE_SETTLE_SEC = "0.15" # wait between same-angle snapshots so frames are fresh
# Pre-GraspNet cloud cleanup (tasks/skills/grasp.py::_clean_object_cloud): strip residue
# noise from the lifted object cloud before it is sent to GraspNet. SOR sheds sparse
# flying-pixel scatter; the DBSCAN nearest-cluster keep drops the locally-dense blob where
# the mask bled onto the supporting table/wall (which SOR can't, and which pulls the grasp
# point off the object). "Nearest" (to the located object centroid) — not "largest" —
# guards against a badly-bled mask making the table the kept cluster. Cleanup can only
# shrink the cloud and never trims below CLEAN_MIN_KEEP (falls back to the input).
WALKIE_GRASP_CLEAN_ENABLE = "1"          # master switch for the cleanup pass
WALKIE_GRASP_CLEAN_SOR_K = "16"          # statistical-outlier kNN (0 = skip SOR)
WALKIE_GRASP_CLEAN_SOR_STD = "2.0"       # SOR std-ratio (smaller = more aggressive)
WALKIE_GRASP_CLEAN_DBSCAN_EPS_M = "0.02" # cluster radius (m) for background-bleed removal
WALKIE_GRASP_CLEAN_DBSCAN_MIN_PTS = "10" # DBSCAN core min-neighbours
WALKIE_GRASP_CLEAN_CLUSTER_MIN = "20"    # min points for a cluster to be eligible as the object
# Don't trim below this — keep it above the server's own min_points (200), since the server
# re-voxels (0.005 m) + SORs after receiving the cloud and rejects what's left under 200; a
# too-small clean cluster defers to the fuller (noisier) cloud instead of a guaranteed reject.
WALKIE_GRASP_CLEAN_MIN_KEEP = "250"
# WALKIE_GRASP_DEBUG_DUMP = "graph_debug/grasp"  # dir to dump raw/kept clouds (.npy) for inspection
WALKIE_GRASP_SCENE_VIZ = "1"         # draw the whole frame as gray dots behind the grasp cloud (viz only)
# Optional GraspNet input-density overrides (server-side knobs passed per request). The
# server re-voxels the cloud at 0.005 m, removes outliers, then random-samples to num_point.
# Measured on a real single-object grasp cloud (graph_debug/grasp_vv_fixture.npz, 4783 pts):
# the 0.005 m voxel collapses it to ~766 pts, so the default num_point=10000 just pads it
# ~13x with DUPLICATES — raising num_point is a no-op. The ONLY knob that adds real points
# is the voxel: 0.005->0.003 m takes ~766 -> ~1824 real pts (2.4x). 0.003 stays closest to
# GraspNet-1Billion's ~5 mm training density; going finer (0.002/0.001) adds more points but
# pushes out-of-distribution, so treat it as a separate experiment. num_point left at the
# server default since it's non-binding at every voxel measured (even 1 mm gives <10000).
# EXPERIMENT — A/B grasp quality on the robot (point count is NOT an accuracy metric).
WALKIE_GRASP_SERVER_VOXEL_M = "0.003"
# WALKIE_GRASP_SERVER_NUM_POINT = "15000"   # non-binding: real cloud never exceeds 10000
# Virtual-viewpoint transform (EXPERIMENT, tasks/skills/grasp.py::get_object_grasp_pos):
# before GraspNet, rigidly rotate the cleaned object cloud into a "side" (horizontal) or
# "top" (straight-down) virtual view so GraspNet GENERATES grasps for that approach —
# distinct from approach_preference, which only re-ranks what GraspNet already proposes.
# The winning grasp is mapped back to the true frame, so nothing downstream changes.
# "none" = off (default). Replay evidence (manual_tests/grasp_virtual_view.py) on this
# robot's ~32deg-down camera: "top" can unlock steeper top-down grasps the oblique view
# never proposes; "side" tends to produce unreachable (approach-from-below) grasps because
# the object's sides aren't captured at a downward tilt. VALIDATE on the arm before relying
# on it — a rotation cannot add occluded data, only re-present what was captured.
# "auto" couples it to the call's approach_preference (so a "side" pick also rotates the
# cloud to a side view); note that coupled combo was the weakest arm in replay, so "auto"
# is opt-in and the default stays "none".
WALKIE_GRASP_VIRTUAL_VIEW = "auto"   # "none" | "side" | "top" | "auto" (follow approach_preference)
# XY-recentring (EXPERIMENT, default off): before GraspNet, slide the cleaned object cloud so
# its centroid sits on the camera optical axis (X=Y=0) while KEEPING its depth (Z) — the
# winning grasp is mapped back, so nothing downstream changes. Composes with VIRTUAL_VIEW
# (applies in every mode, including "none"). Motivation: GraspNet sometimes aims grasps toward
# the frame centre when the object sits off-axis. Caveat: GraspNet-1Billion's PointNet++ backbone
# is ~translation-invariant, so this may well be a no-op — A/B it first with
# manual_tests/grasp_virtual_view.py (the "*+ctr" arms), raising WALKIE_GRASP_VV_REPEATS so
# server-side sampling noise can't fake a difference. NEVER zero Z: that puts the object at the
# camera, out of GraspNet's ~0.3-1.0 m training distribution.
WALKIE_GRASP_CENTER_XY = "1"   # "1"/"true" to recentre the cloud's XY (depth kept) before GraspNet
# Hard-drop "bottom-up" grasps when a side/top approach_preference is active: the max
# allowed approach·up sent to the server's hemisphere filter (only it reads this). "0.0"
# keeps only at/below-horizontal approaches (the true bottom-hemisphere cut); the server's
# own default (~0.2) lets a grasp tilt ~11.5deg UPWARD — which is why side grasps sometimes
# come in from a slightly upward angle. Empty = leave the server default. Raise it (e.g.
# "0.1") if a strict cut leaves no grasp. NOTE: the filter only runs when approach_preference
# is set, so a transform-only call (VIRTUAL_VIEW=side, preference "none") is NOT filtered.
WALKIE_GRASP_MAX_APPROACH_UP = "0.0"
# Grasp execution retries: if arm go_to_pose fails, strafe the base sideways (away from
# the centreline on the arm's side) + step back, then re-execute the same map-frame
# candidate (pure translation keeps it valid; new arm geometry can solve a failed IK).
WALKIE_GRASP_RETRY_ATTEMPTS = "3"    # max grasp executions per pick
WALKIE_GRASP_RETRY_STRAFE_M = "0.08" # sideways base step between retries
WALKIE_GRASP_RETRY_BACK_M = "0.05"   # backward base step between retries
# How pick_object lines the chosen arm up with the object before grasping (step 4):
#   "rotate" (default — the usable PR #31 behaviour) — turn the base so the arm shoulder
#     aims at the object (face_object_with_arm).
#   "strafe" (experimental, NOT yet validated on-robot) — slide the omni base sideways
#     with the heading HELD (align_arm_to_object). Addresses an over-rotation seen when
#     the object is close ("rotate" can over-shoot and face the wall, dropping the object
#     out of view). Opt in only after an on-robot A/B.
WALKIE_GRASP_ARM_ALIGN = "rotate"    # "rotate" | "strafe"
# Descriptor-prompt detection + CLIP rerank (tasks/skills/grasp.py): YOLOE is prompt-driven
# and can't box brand names ("coke"), but under a generic visual descriptor ("can","red can")
# it returns SEVERAL boxes — so we detect with descriptors (the _GRASP_DESCRIPTORS map),
# then CLIP-rerank the boxes against the SPECIFIC target name and pick the best match.
# "0" = exactly today's behaviour (single-prompt detect + nearest-wins); the real kill switch
# if a server lacks per_detection embeddings. Gates BOTH prompt expansion and rerank.
WALKIE_GRASP_CLIP_RERANK = "1"
# CLIP cosine floor: drop boxes scoring below this against the target. "0.0" = pure rerank,
# reject nothing (raw CLIP cosines on small crops are compressed; a high floor on UNTUNED
# CLIP silently rejects the real target -> nearest fallback). RAISE only after on-robot tuning.
WALKIE_GRASP_CLIP_SIM_THRESHOLD = "0.0"
# CLIP text-query template ("{t}" = target); "a photo of {t}" beats a bare brand string
# in CLIP zero-shot. Tune on-robot.
WALKIE_GRASP_CLIP_QUERY_TMPL = "a photo of {t}"
# Descriptor SOURCE: ask the LLM (ctx.model) to generate the generic visual phrases YOLOE
# detects with, few-shot-anchored on the _GRASP_DESCRIPTORS map — so an arbitrary GPSR
# target (not in that map) still gets boxable descriptors instead of just its brand name.
# Cached once per target. "0" = use ONLY the static map (exactly the pre-LLM behaviour) —
# the rollback switch. On any LLM failure/timeout it falls back to the static map anyway.
WALKIE_GRASP_LLM_DESCRIPTORS = "1"
# Wall-clock cap on that one LLM round-trip (ctx.model is built without an HTTP timeout, so
# a stalled endpoint must not hang the grasp): on timeout it degrades to the static map.
WALKIE_GRASP_LLM_DESCRIPTORS_TIMEOUT_S = "10"

[skills]
# Final-approach "creep" — direct cmd_vel closed-loop relative drive (NOT Nav2), used
# for the cm-scale precision moves next to a table where Nav2 would route around the
# inflation / fail to strafe and nudge the base backwards (tasks/skills/navigation.py
# creep_base_relative; grasp align/creep/retry-reposition). Stops on integrated odom
# displacement, hard-guarded by a slow speed, a stop margin, a timeout and a finally-stop.
WALKIE_CREEP_SPEED_MPS = "0.08"      # cruise speed; eased down to MIN near the goal
WALKIE_CREEP_MIN_SPEED_MPS = "0.03"  # floor so it overcomes stiction near the goal
WALKIE_CREEP_TOL_M = "0.01"          # stop when remaining displacement <= this (m)
WALKIE_CREEP_HZ = "15.0"             # cmd_vel publish / odom poll rate
WALKIE_CREEP_KP_LIN = "1.5"          # P gain easing speed down as it nears the goal
WALKIE_CREEP_KP_YAW = "1.2"          # P gain holding the start heading during the creep
WALKIE_CREEP_MAX_YAW_RPS = "0.4"     # cap on the heading-hold yaw rate (rad/s)
WALKIE_CREEP_STALL_EPS_M = "0.002"   # odom progress per cycle below this counts as "stuck"
WALKIE_CREEP_STALL_SEC = "0.6"       # bail after this long of no progress (dead odom / blocked)

# Arena-entry door detection (tasks/skills/door.py is_door_open / door_open_from_depth),
# the built-in is_open sensor for request_open_door. Reads the depth camera: the door
# is CLOSED when a near surface fills the central doorway region. CALIBRATE on-robot
# with `uv run python -m manual_tests.calibrate_door`.
# Robot stands ~0.5 m from the closed door, so the closed reading is ~0.5 m; 0.9 sits
# above that (robust "closed") and below the clear-arena reading once it opens.
WALKIE_DOOR_CLEAR_M = "0.9"           # median depth (m) below this in the centre = closed
WALKIE_DOOR_CENTER_FRAC = "0.4"      # central fraction of the frame to inspect (the doorway)
WALKIE_DOOR_MIN_VALID_FRAC = "0.5"   # min fraction of valid depth pixels to trust a "closed"
# request_open_door self-watch: ask once, then poll depth and walk in the moment the
# door reads clear (no spoken confirmation needed when the camera can see the doorway).
WALKIE_DOOR_POLL_SEC = "0.5"         # seconds between depth checks while waiting
WALKIE_DOOR_CONFIRM_READS = "2"      # consecutive open reads before going in (debounce)
WALKIE_DOOR_REPROMPT_SEC = "15"      # re-ask "please open the door" this often while waiting
WALKIE_DOOR_WAIT_SEC = "120"         # give up and proceed after this long; <= 0 = wait forever
# go_to_through_door: a partly-open door reads "open" but blocks nav; ask for it wider
# and pause this long for the human before retrying the drive (nav success = the signal).
WALKIE_DOOR_RETRY_PAUSE_SEC = "3"    # seconds to wait after asking, before retrying nav
WALKIE_DOOR_PROGRESS_EPS_M = "0.3"   # if the robot got >this much closer to goal between retries
                                     # it's driving THROUGH the door -> retry quietly, don't re-ask
WALKIE_DOOR_AT_GOAL_M = "0.5"        # nav FAILED but robot is within this of the goal -> treat as
                                     # reached, not a door (placement poses sit right at furniture,
                                     # which fails the goal checker + fills the depth box). <=0 = off

[placement]
# Surface detection + object placement (tasks/skills/place.py, surface geometry in
# interfaces/perception/surfaces.py). The map frame is gravity-aligned (+Z up), so a
# horizontal surface is a constant-Z band — these knobs tune the height-clustering and
# the empty-space search. CALIBRATE the reach/footprint values on the real arm.
# Full-scene cloud lift (override the per-detection WALKIE_GRAPHS_* defaults).
WALKIE_PLACE_SCENE_VOXEL_M = "0.015"   # voxel size for the whole-scene cloud
# Depth limit on the raw camera ray (m): drops everything past the workspace right in
# front, so far walls/people never reach surface detection. ~1 m covers a table within
# arm reach at the configured head tilts; raise if the far table edge gets clipped.
WALKIE_PLACE_MAX_DEPTH_M = "1.0"       # close/placement scan: workspace bound (accuracy + bg)
# The INITIAL surface-finding scan runs before the robot drives in (place_object has its
# own approach), so it needs more reach than the close placement scan or a table at
# standoff range gets clipped and place aborts. The normal gate rejects walls/standing
# bodies at this range too, and the nearest reachable surface is chosen, so background
# isn't picked. Lower toward placement range if far clutter ever gets selected.
WALKIE_PLACE_APPROACH_MAX_DEPTH_M = "2.0"  # initial find-a-surface scan depth (before approach)
# Multi-tilt fused surface scan: take 2 snapshots at these head tilts (rad, +down) and
# merge their map-frame clouds before detecting surfaces, so two viewpoints fill each
# other's self-occlusion (denser coverage, truer surface extents).
WALKIE_PLACE_MULTI_TILT = "1"          # enable the 2-snapshot fused surface scan
WALKIE_PLACE_TILT_A = "0.3"            # first head tilt (rad) for the fused scan
WALKIE_PLACE_TILT_B = "0.6"           # second head tilt (rad)
WALKIE_PLACE_TILT_SETTLE_SEC = "0.4"   # wait after each head tilt before capturing
# Horizontal-surface detection.
WALKIE_SURFACE_Z_GAP_M = "0.04"        # split height bands at vertical gaps wider than this
WALKIE_SURFACE_MIN_POINTS = "150"      # drop surfaces with fewer points than this
WALKIE_SURFACE_XY_EPS_M = "0.05"       # DBSCAN eps splitting tables at the same height
WALKIE_SURFACE_XY_MIN_POINTS = "30"    # DBSCAN min points for an XY cluster
# Minimum usable flat area (m^2) a surface must cover to count — the true occupied
# area, not the bounding box, so an L-shape / sparse scatter with a big box is rejected.
# 0.05 m^2 ~= a 22x22 cm patch; raise it to ignore small clutter surfaces.
WALKIE_SURFACE_MIN_AREA_M2 = "0.05"    # drop surfaces below this real flat area
WALKIE_SURFACE_AREA_CELL_M = "0.05"    # grid resolution of the area estimate
# Surface height is the MODAL (densest) Z layer at this bin resolution, not a percentile,
# so an object resting on a surface can't drag its detected height up.
WALKIE_SURFACE_Z_BIN_M = "0.01"        # bin width for the modal surface-height estimate
# |n_z| gate (needs Open3D): keep near-horizontal surfaces, reject walls and standing
# bodies (normals pointing sideways). 0.85 ~= within 32deg of horizontal. Lower toward
# 0.8 if it strips a noisy real tabletop; set empty ("") to disable the gate.
WALKIE_SURFACE_NORMAL_Z_MIN = "0.85"   # reject vertical structure (walls/people)
# Release wrist orientation. "hold" reuses the grasp pose (keeps the object upright, but
# that arbitrary pose is often IK-unsolvable at the new surface -> pre-place FAILED).
# "topdown" uses the calibrated WALKIE_GRASP_RPY_TOPDOWN (a known-reachable overhead wrist).
# Either way execute_place now auto-retries top-down if the chosen pose won't solve, so
# "hold" no longer hard-fails to Tier-2; set "topdown" to skip the doomed hold attempt.
WALKIE_PLACE_ORIENTATION = "hold"
# Empty-space search + place geometry.
WALKIE_PLACE_FOOTPRINT_M = "0.12"      # object footprint (square side) when not recorded at pick
WALKIE_PLACE_CLEARANCE_M = "0.03"      # keep this clear around the placed object
# Lifts the free-space occupancy floor clear of the surface's OWN sensor-noise band, so
# the upper tail of the tabletop's points isn't mistaken for clutter (surface z is now the
# modal/band-centre height, not a high percentile). ~ the depth noise at working range.
WALKIE_PLACE_SURFACE_SKIN_M = "0.02"   # occupancy floor skin above the surface plane
WALKIE_PLACE_CELL_M = "0.04"           # occupancy grid resolution
WALKIE_PLACE_EDGE_MARGIN_M = "0.05"    # keep the object this far from the table edge
WALKIE_PLACE_Z_OFFSET_M = "0.02"       # extra clearance added above the reconstructed height
WALKIE_PLACE_FALLBACK_OFFSET_M = "0.05"  # grasp-to-surface offset to assume when none recorded
WALKIE_PLACE_STANDOFF_M = "0.10"       # pre-place / retreat height above the hover point
# The arm parks the object this far ABOVE the surface, then the precise torso lift
# lowers it straight down before releasing (the arm's cartesian descent at full reach
# is imprecise and drops the object from too high).
WALKIE_PLACE_LOWER_M = "0.1"          # hover height above the surface; lift lowers by this
WALKIE_PLACE_SETTLE_SEC = "0.6"        # wait after a lift move to let it settle
WALKIE_PLACE_MIN_Z_M = "0.60"          # don't place below this height (arm can't reach). 0.60 not 0.70: the practice-arena cabinet top is 0.71m, so a 0.70 floor left ~1cm margin and depth-scan noise dropped the surface below it -> "no reachable surface". 0.60 gives ~11cm headroom while still rejecting chairs/low tables.
WALKIE_PLACE_MAX_REACH_XY_M = "0.75"   # abort if the spot is farther than this (planar)