# walkie-agent-v2 config.
#
# This file holds nearly all configuration — tuning knobs plus the endpoints and
# transport that used to live in .env. None of it is secret, so it's safe to
# version-control. The ONLY things left in .env are the OpenRouter API key and
# its base URL (OPENROUTER_API_KEY / OPENROUTER_BASE_URL).
#
# Precedence (highest wins):
#   1. a real shell environment variable
#   2. a value in .env
#   3. a value here in config.toml
#   4. the hardcoded default in code
#
# So you can still override any of these from .env or the shell for a one-off
# run without editing this file. Values are written as the same strings the
# code's os.getenv() calls expect (e.g. "1"/"0" for flags, "" to disable).
#
# Competition tasks keep their own config in tasks/<NAME>/config.toml, loaded
# BEFORE this file (tasks.common.load_task_config) — so a task file both holds
# its task-specific keys and may override any global key here for that task.

[llm]
# 1 = use a local OpenAI-compatible LLM (LOCAL_BASE_URL/LOCAL_MODEL) instead of
# OpenRouter. The OpenRouter API key + base URL are the only things left in .env.
LLM_USE_LOCAL = "1"
WALKIE_MODEL = "anthropic/claude-sonnet-4.5"
WALKIE_TEMPERATURE = "0.5"
# Local LLM endpoint (OpenAI-compatible), used when LLM_USE_LOCAL=1.
LOCAL_BASE_URL = "http://10.0.0.202:8000/v1"
LOCAL_MODEL = "qwen3.5-9b"

[services]
# Remote AI inference server (walkie-ai-server): STT, TTS, object detection,
# image captioning, pose estimation, CLIP image-embed.
WALKIE_AI_BASE_URL = "http://10.0.0.202:5000"

[transport]
# walkie-sdk robot transport. ROS services over rosbridge (default), camera over
# zenoh. Force zenoh services only if you've shipped the perception/srv into
# zenoh_ros2_sdk. Port defaults: 9090 for rosbridge, 7447 for zenoh.
WALKIE_ROS_PROTOCOL = "hybrid"
WALKIE_ROS_PORT = "9090"
# IP of the robot for the walkie-sdk transport (rosbridge + zenoh camera). Leave
# 127.0.0.1 when running on the robot itself; set to walkie's own LAN IP (e.g.
# 10.0.0.201) when running from a developer PC. Note: walkie is NOT the same
# machine as the AI server at WALKIE_AI_BASE_URL — they're separate boxes.
WALKIE_ROBOT_IP = "10.0.0.201"

[runtime]
# 1 = type instructions at a TTY instead of speaking (no mic).
DISABLE_LISTENING = "0"

[people]
# Face/appearance person memory (perception.PeopleStore): two-modality re-ID
# over InsightFace + OSNet embeddings from walkie-ai-server. Used by the HRI
# task to remember guests; same single-process ChromaDB caveat as the other
# stores. Wipe by removing the PEOPLE_CHROMA_DIR / PEOPLE_FRAMES_DIR dirs below.
PEOPLE_CHROMA_DIR = "chroma_db_people"
PEOPLE_FRAMES_DIR = "people_frames"
# Face-only match gate: max cosine DISTANCE (1 - similarity) to accept.
FACE_MATCH_THRESHOLD = "0.4"
# Fused (face+attire) match gate: min fused SIMILARITY score to accept.
APPEARANCE_MATCH_THRESHOLD = "0.5"

[agent]
# History summarization (agents/core/agent.py middleware).
WALKIE_SUMMARIZE_AT_TOKENS = "6000"
WALKIE_SUMMARIZE_KEEP_MSGS = "12"

[robot]
# 1 = pause after each movement / arm action (debugging).
PAUSE_AFTER_WALK = "0"

[manipulation]
# Robot-wide grasp/arm knobs shared by every manipulation task (Pick and Place,
# Restaurant, ...). Read by tasks/manipulation/. The arm + gripper motion is real.
# CALIBRATE every orientation/offset below on the real robot before a run.

# Grasp PLANNER: "graspnet" (default) computes EE poses with GraspNet from each
# object's stored walkie_graphs point cloud and plans collision-aware against a
# MoveIt table box; "stub" uses the original heuristic (centroid + a fixed
# orientation) — no GPU / no DB, for offline arm testing.
WALKIE_GRASP_PLANNER = "graspnet"    # "graspnet" | "stub"

WALKIE_ARM = "left"                  # which arm group: "left" or "right"
WALKIE_ARM_FRAME = "base_footprint"  # arm planning frame: "base_footprint" or "map"
WALKIE_SURFACE_CLASS = "table"       # walkie_graphs class to resolve for the table box
# Add the table/shelf collision box to the MoveIt scene before the grasp. Off by
# default: an uncalibrated box swallows the grasp pose so MoveIt can't plan; with
# it off the arm plans against the octomap alone. Turn on once the box is dialed in.
WALKIE_STAGE_TABLE = "0"             # "1" to stage the surface collision box

# GraspNet INPUT source (graspnet planner only): "cloud" feeds the object's stored
# walkie_graphs point cloud to grasp.from_cloud; "pos" feeds that cloud to
# grasp.from_pos (which also crops the live view + antipodal-validates); "mask"
# runs a fresh live segmentation and feeds grasp.from_mask. cloud/pos need the DB;
# mask needs only the live camera.
WALKIE_GRASP_SOURCE = "cloud"        # "cloud" | "mask" | "pos"

# --- stub planner orientation (also the GraspNet fallback) ---
WALKIE_GRASP_APPROACH = "top_down"   # "top_down" (overhead) or "front" (horizontal)
# End-effector orientation (roll,pitch,yaw rad) per approach. Defaults are borrowed
# from the HRI reach/place poses on this robot — VERIFY on the arm for grasping.
WALKIE_GRASP_RPY_TOPDOWN = "-2.623,-0.033,-1.468"
WALKIE_GRASP_RPY_FRONT = "-0.8,0.0,-1.5708"
WALKIE_GRASP_Z_OFFSET_M = "0.0"      # vertical nudge added to the object centroid

# --- GraspNet ranking (shared by cloud/pos/mask) ---
WALKIE_GRASP_FROM_CLOUD_SCORE_TH = "0.0"  # min grasp score (0 = no filter)
WALKIE_GRASP_FROM_CLOUD_MAX = "20"        # max grasp poses to request
# from_pos (live crop + antipodal validation):
WALKIE_GRASP_FROM_POS_CROP_MARGIN_M = "0.0"  # live-crop margin around the object box
WALKIE_GRASP_FROM_POS_ANTIPODAL_W = "0.0"    # antipodal-quality re-rank weight
# from_mask (live segmentation):
WALKIE_GRASP_MASK_NUM_FRAMES = "0"        # frames to accumulate (0 = adaptive 1->3->5)

# --- approach + camera framing (GraspNet path) ---
# The standoffs drive via the SDK NavigateToObject (nav.go_to heading=None): the
# value is the distance from the edge nav_commander fits to the object/surface, not
# a line-of-sight pullback from the centroid.
WALKIE_PICK_STANDOFF_FAR_M = "0.35"  # initial approach standoff (spec 0.40–0.30)
WALKIE_PICK_STANDOFF_NEAR_M = "0.10" # refined grasp standoff (spec 0.15–0.05)
WALKIE_PICK_ALIGN_METHOD = "nearest_edge"  # NavigateToObject alignment: "nearest_edge" (default) or "face_target"
WALKIE_PICK_HEAD_TILT_RAD = "0.5"    # +ve = camera DOWN to see the surface
WALKIE_PICK_LIFT_NORM = "0.5"        # lift height (normalized 0–1) to reach the table
WALKIE_PICK_CAMERA_SETTLE_SEC = "1.0" # wait after lift/tilt before capture

# --- testing ---
# Step-through gate: when "1", every arm/base motion waits for the tester to press
# Enter (s=skip that action, q=abort the sequence). Off for normal/autonomous runs.
WALKIE_MANIP_CONFIRM = "0"
# Publish an RViz marker (on walkie/viz_markers) at each nav.go_to target BEFORE
# its confirm gate, so a tester can see where the base will drive. "0" disables.
WALKIE_MANIP_VIZ = "1"

# --- common motion ---
WALKIE_PREGRASP_OFFSET_M = "0.10"    # heuristic pre-grasp standoff (stub path only)
WALKIE_LIFT_HEIGHT_M = "0.15"        # how far to lift after grasping
WALKIE_PLACE_Z_CLEARANCE_M = "0.10"  # hover above the surface before releasing
WALKIE_CARRY_POSE = "standby"        # go_to_home preset to tuck the arm for nav
WALKIE_TABLE_FALLBACK_SIZE = "0.8,1.2"  # depth_x,width_y table box when no DB node

# Wire encoding of the GraspNet cloud's data (uint8[]) field — per transport:
# "ndarray" (zenoh/hybrid, default), "base64" or "list" (rosbridge-only JSON).
# zenoh coerces fields with np.asarray(), which rejects raw bytes; rosbridge JSON
# rejects both numpy arrays and bytes — so each transport needs its own form.
WALKIE_PC2_DATA_ENCODING = "ndarray"

WALKIE_MIC_DEBUG_DIR = "mic_recording"