# Pick and Place task config (rulebook 5.2) — loaded by tasks/PickAndPlace/run.py
# via tasks.common.load_task_config BEFORE the root config.toml, so any key here
# wins over the global value. Shell env and .env still override both.
# Precedence: shell env > .env > this file > root config.toml > code default.
#
# PLACEHOLDER: every waypoint is a stub "x,y,heading_rad" — set them after
# mapping the kitchen arena.

[pick_and_place]
# Map-frame waypoints "x,y,heading_rad".
PNP_KITCHEN_POSE = "0.0,0.0,0.0"            # entry / kitchen approach
PNP_DINING_TABLE_POSE = "0.0,0.0,0.0"       # facing the dining table
PNP_DISHWASHER_POSE = "0.0,0.0,0.0"
PNP_CABINET_POSE = "0.0,0.0,0.0"
PNP_TRASH_BIN_POSE = "0.0,0.0,0.0"
PNP_BREAKFAST_SURFACE_POSE = "0.0,0.0,0.0"  # where bowl + spoon start
PNP_EXTRA_SURFACE_POSE = "0.0,0.0,0.0"

# Open-vocab detector prompts for the dining-table / extra-surface objects.
PNP_TABLE_CLASSES = "cup,mug,plate,fork,knife,spoon,bottle,box,can,bowl"
# Breakfast detector prompts: bowl+spoon on the surface, milk+cereal in the cabinet.
PNP_BREAKFAST_SURFACE_CLASSES = "bowl,spoon"
PNP_BREAKFAST_CABINET_CLASSES = "milk,cereal,box,carton"
# The object category treated as trash this run (announced during Setup Days).
PNP_TRASH_CATEGORY = ""

# --- Manipulation -----------------------------------------------------------
# The robot-wide grasp/arm knobs (WALKIE_ARM, WALKIE_GRASP_*, WALKIE_CARRY_POSE,
# ...) now live in the ROOT config.toml [manipulation] block, shared with the
# other manipulation tasks. Only the PickAndPlace-specific place poses are here.
#
# Per-destination drop poses "x,y,z,roll,pitch,yaw" in WALKIE_ARM_FRAME. Empty ->
# the robot navigates to the furniture and opens the gripper to drop in front.
PNP_PLACE_POSE_DISHWASHER = ""
PNP_PLACE_POSE_CABINET = ""
PNP_PLACE_POSE_TRASH = ""
PNP_PLACE_POSE_DEFAULT = ""

# Breakfast layout slots on the dining table "x,y,z,roll,pitch,yaw" (arm frame):
# spoon next to bowl, cereal next to milk, clear space around them (rulebook 11/12).
PNP_BREAKFAST_BOWL_POSE = ""
PNP_BREAKFAST_SPOON_POSE = ""
PNP_BREAKFAST_MILK_POSE = ""
PNP_BREAKFAST_CEREAL_POSE = ""

# Optional goals — off by default (autonomous appliance manipulation not implemented).
PNP_ENABLE_DISHWASHER = "0"   # ask referee to open/close door, pull/push rack, place tab
PNP_ENABLE_POUR = "0"         # pour milk + cereal into the bowl
