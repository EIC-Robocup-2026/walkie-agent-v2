# HRI (receptionist) task config — loaded by tasks/HRI/run.py via
# tasks.common.load_task_config BEFORE the root config.toml, so any key here
# (including keys that also exist in the root file, e.g. WALKIE_MODEL) wins
# over the global value. Real shell env vars and .env still override both.
#
# Precedence: shell env > .env > this file > root config.toml > code default.

[hri]
# Nav waypoints now come from the shared arena map (world.toml) via ctx.world:
# GoToDoor reads the `entrance` door pose; GuideToLivingRoom reads the `living_room`
# room pose. HRI_DOOR_POSE / HRI_LIVING_ROOM_POSE were removed — the map is the single
# source of truth. (HRI_DOOR_POSE still works as an optional env override on a box with
# no map; set it in .env if needed.)
# Host's name and favorite drink (given in the competition briefing). Used in
# the seat-offer wording ("next to our host James"); "" = unknown.
HRI_DOOR_POSE = "1.15,0,3.14"
HRI_HOST_NAME = "Host"
# HRI_HOST_DRINK = "none"
# Open-vocab detector prompts used to find seats.
HRI_SEAT_CLASSES = "seat,chair,sofa,armchair,stool"
# Longest edge (px) to downscale the seat-detection frame to before sending it
# to the detector — cuts JPEG-encode + transfer time. The client scales the
# returned bbox back to the original resolution, so seat geometry is unchanged.
# Empty = full resolution (no downscale). Seats are large objects, so 640 is a
# safe speedup; leave empty until you've A/B'd it. Does NOT affect the
# walkie_graphs 3D-mapping path, which always sends full resolution.
HRI_SEAT_DETECT_MAX_SIZE = ""
# Used by match_people_to_seats to tie a recognized person to the seat their
# box overlaps most: a person claims a seat when (person bbox ∩ seat bbox) /
# seat area >= this.
HRI_SEAT_OCCUPIED_OVERLAP = "0.25"
# Seat occupancy assumes EVERYONE in view is seated (the new guest stands next
# to the robot, outside the seating area): each person claims the seat/cushion
# under their seating anchor — hips when detected, else the bbox lower-centre.
# Min keypoint confidence for a hip to be used as that anchor.
HRI_POSE_KP_CONF = "0.3"
# --- OfferSeat multi-view scan (scan_seats_sweep) ------------------------------
# OfferSeat scans left/center/right (base rotation of +D/0/-D degrees, positive
# = left) so seats off to the side of a single forward frame are found too;
# each rotation settles for HRI_SWEEP_SETTLE_SEC before capturing. 0 = one
# forward scan only.
HRI_SEAT_SWEEP_DEG = "20"
# The views overlap, so the same physical seat is detected more than once. Two
# same-kind detections whose lifted map-frame centres are closer than this (m)
# are merged, keeping the most CENTRAL view's instance (head-on occupancy is
# trusted over a side view that may clip the seat at the frame edge). Sofas get
# their own, larger radius — a clipped sofa's visible centre wanders more.
HRI_SEAT_SWEEP_DEDUP_M = "0.5"
HRI_SEAT_SWEEP_DEDUP_SOFA_M = "1.0"
# Detector classes treated as multi-seat sofas (split into LEFT/MIDDLE/RIGHT
# cushions with per-cushion occupancy) instead of one free/taken unit.
HRI_SOFA_CLASSES = "sofa,couch,bench,loveseat"
# 1 = sofas have LEFT/MIDDLE/RIGHT cushions; 0 = LEFT/RIGHT only (two-seaters).
HRI_SOFA_HAS_MIDDLE = "1"
# OfferSeat: before finishing, confirm the guest sat down — treat them staying
# recognized in the frame continuously for DWELL_SEC as seated. Bounded by
# WAIT_TIMEOUT_SEC so a no-show can't stall the run; the camera is polled every
# POLL_SEC (real rate is also capped by the recognition round-trip).
HRI_SEATED_DWELL_SEC = "3"
HRI_SEATED_WAIT_TIMEOUT_SEC = "20"
HRI_SEATED_POLL_SEC = "0.5"
# Horizontal field of view (deg) for pixel->heading conversion (tune for ZED).
HRI_CAMERA_HFOV_DEG = "110"
# GreetAndLearn: per missing field (name / drink), how many times to re-ask &
# re-extract until we get it before moving on (asking for missing info is not a
# penalized confirmation question).
HRI_ASK_RETRIES = "4"
# --- GreetAndLearn posed capture ---------------------------------------------
# After the Q&A the robot steps back, says "say cheese", and takes a burst of
# face frames (head level) + attire frames (head tilted DOWN to frame the body),
# averaging each into one embedding for a robust enrollment. Tune for the door.
HRI_GREET_BACKUP_M = "0.30"          # step back this far (m) so face + body fit in frame
HRI_GREET_FACE_TILT = "-0.15"          # head tilt (rad) for the FACE frames (0 = level; + = down)
HRI_GREET_APPEARANCE_TILT = "0.15"   # head tilt (rad) for the ATTIRE frames (tilts down to the body)
HRI_GREET_CAPTURE_COUNT = "3"        # frames per modality, averaged for a robust embedding
HRI_GREET_TILT_SETTLE_SEC = "0.8"    # wait (s) after an async head tilt before capturing
HRI_GREET_CAPTURE_GAP_SEC = "0.3"    # gap (s) between burst frames so they aren't identical
# Within-guest burst outlier rejection: drop a frame whose embedding is far from
# the burst centroid (caught a bystander / blur) before averaging. Conservative —
# only fires with >=3 frames and never strips a modality below one frame.
HRI_BURST_OUTLIER_REJECT = "1"       # 0 disables it (just average every frame)
HRI_BURST_OUTLIER_MIN_SIM = "0.5"    # absolute cosine-to-centroid floor to keep a frame
HRI_BURST_OUTLIER_MAD_K = "3.0"      # also drop frames below median - K*MAD (robust gate)
# Cross-guest near-duplicate audit (AuditIdentities, after both guests + host are
# enrolled): flag pairs whose face/attire vectors are too alike. Two distinct
# guests can't be merged, so action=log just warns; action=widen also raises the
# attire margin on an attire collision so recognition leans on the face.
HRI_DUP_FACE_SIM = "0.75"            # face cosine-sim at/above which a pair is flagged
HRI_DUP_APP_SIM = "0.85"             # attire cosine-sim flag (clothes legitimately resemble more)
HRI_DUP_ACTION = "widen"             # log = warn only; widen = warn + lean on face
HRI_DUP_WIDENED_APP_MARGIN = "0.10"  # if action=widen: raise HRI_FOLLOW_APPEARANCE_MARGIN to this
# --- Enrollment dedup + recognition quality gates ----------------------------
# 1 = before enrolling, check whether the person strongly matches someone already
# enrolled. When the caller pinned no id, reuse the matched id (no duplicate
# record); when the caller pinned an id that strongly matches a DIFFERENT existing
# id, log a duplicate warning (never auto-merge distinct guests — that would drop
# one). 0 = always enroll under the requested id.
HRI_ENROLL_DEDUP = "1"
# Fused-similarity floor for the pre-enroll dedup check — higher than the
# recognition floor (APPEARANCE_MATCH_THRESHOLD=0.5) so only a STRONG match
# reuses/flags an id and a weak match safely creates a new person.
HRI_ENROLL_DEDUP_MIN_SCORE = "0.7"
# A detected face must clear this detection score to be trusted for a HARD identity
# decision (introduction labeling, follow re-acquire). Below it the embedding is
# too noisy to label someone with; steady-state follow maintenance is NOT gated on
# it (a small far face still holds an existing lock). Matches the face_conf_med
# fusion knee, so lower-confidence faces were already scored appearance-only.
HRI_RECOG_MIN_DET_SCORE = "0.5"
# Minimum face bbox area (px^2) for a HARD identity decision (and for the
# non-host-face exclusion). ~50x50 px — a guest seated across the living room
# still clears it. Deliberately NOT the door-greeter's HRI_FACE_MIN_AREA_PX
# (10000), which is sized for someone standing right in front of the robot.
HRI_RECOG_MIN_FACE_AREA_PX = "2500"
# 1 = also require a roughly front-facing pose before a HARD identity decision.
# Opt-in hook, off by default (the face box arrives without its pose keypoints).
HRI_RECOG_REQUIRE_FRONTAL = "0"
# Minimum person-crop area (px^2) before its attire embedding is trusted for a
# follow decision. 0 = no size gate (default).
HRI_RECOG_MIN_CROP_PX = "0"
# --- Face presence & tracking ------------------------------------------------
# "Biggest face" must exceed this bbox area (px²) to count as the person
# standing right in front — distant bystanders are ignored. Used both by
# GoToDoor's wait and GreetAndLearn's tracker. Tune for the camera resolution.
HRI_FACE_MIN_AREA_PX = "10000"
# GoToDoor: max seconds to wait for a guest's face before greeting anyway, and
# how often (s) to poll the camera while waiting.
HRI_FACE_WAIT_TIMEOUT_SEC = "90"
HRI_FACE_WAIT_POLL_SEC = "0.5"
# GreetAndLearn face tracking (FaceTracker in tasks/skills/people.py): a continuous
# cmd_vel proportional loop, NOT discrete rotate_to steps. A detection thread sets an
# absolute target heading; a control thread at HZ drives to it with wz = KP*error,
# clamped to [MIN_WZ, MAX_WZ] rad/s and held at 0 inside a DEADBAND_DEG dead-band. If
# no fresh face arrives for LOST_SEC the base stops. LIFT=1 aims via a depth deprojection
# of the face (needs a full snapshot per detection) instead of the depth-free HFOV bearing.
# Gains are on-robot-unverified — kept conservative; A/B on the robot before trusting.
HRI_FACE_TRACK_HZ = "15"
HRI_FACE_TRACK_KP = "1.2"
HRI_FACE_TRACK_MAX_WZ = "0.6"
HRI_FACE_TRACK_MIN_WZ = "0.15"
HRI_FACE_TRACK_DEADBAND_DEG = "6"
HRI_FACE_TRACK_LOST_SEC = "1.0"
HRI_FACE_TRACK_LIFT = "1"
# IntroduceGuests sweeps left/center/right by this many degrees (base rotation,
# positive = left) to find guests who drifted off-center before introducing them.
HRI_INTRO_SWEEP_DEG = "25"
# Seconds to let the base + depth settle after each sweep rotation before capturing.
HRI_SWEEP_SETTLE_SEC = "1.0"
# --- Introduction recognition (locate_people) --------------------------------
# When matching a face's box to an enrolled guest, that guest's fused score must
# beat the RUNNER-UP enrolled id's score on the same box by this margin, else the
# box is left unlabeled (the caller falls back to the guest's stored seat rather
# than risk labeling person A as person B). Assignment across boxes is globally
# optimal (max total similarity), so a higher wrong pairing can't steal another
# guest's box either. 0 = accept the top-1 id per box (old behaviour).
HRI_LOCATE_BOX_MARGIN = "0.06"
# Minimum sweep frames that must agree on an id<->box match before it is trusted.
# 1 = a single frame suffices (old behaviour); 2 demands agreement across the
# left/center/right sweep for near-identical guests (more precise, slightly lower
# recall).
HRI_LOCATE_MIN_VOTES = "1"
# 1 = forget all remembered people at task start (guests differ every run).
HRI_PEOPLE_RESET = "1"
# --- TestRememberAndDisplay slice (HRI_SLICE=remember_display) ----------------
# After enrolling host + guest 1 + guest 2, the recognition display loops at this
# interval (s), locating all three in the live view. Each frame is shown in a cv2
# window and always written to HRI_RECOG_VIZ_PATH (so it works headless too).
HRI_RECOG_INTERVAL_SEC = "0.5"
HRI_RECOG_VIZ_PATH = "recog_viz.jpg"
# --- TestPersonAppearance slice (HRI_SLICE=person_appearance) ------------------
# Loop interval (s) for detect-person + appearance-caption; each annotated frame
# is shown in a cv2 window and always written to HRI_APPEARANCE_VIZ_PATH.
HRI_APPEARANCE_INTERVAL_SEC = "1.0"
HRI_APPEARANCE_VIZ_PATH = "person_appearance_viz.jpg"
# 1 = LLM-distill every raw appearance caption to person-only details (clothing
# colors, hair, glasses, ...) before storing/speaking it — the server's caption
# model narrates the whole scene ("a room with chairs and a projector screen...")
# no matter what the prompt says. Costs one LLM round-trip per caption (only at
# enrollment / host scan). 0 = keep the raw VLM caption.
HRI_APPEARANCE_DISTILL = "0"
# 1 = enable the timed gripper bag-handover steps (no torque sensing yet).
HRI_ENABLE_BAG = "1"
# Effort threshold when bag is placed
HRI_BAG_EFFORT_THRESHOLD = "0.4"
# Max seconds to wait for the bag's effort spike before giving up (no-show guest).
HRI_BAG_WAIT_TIMEOUT_SEC = "20"
# --- Follow host & place the bag ---------------------------------------------
# How far (m) the base stops short of the host when following, so it never
# bumps them (the host's lifted body point minus this along the approach line).
HRI_FOLLOW_DISTANCE_M = "1.2"
# Close-range drive via direct cmd_vel instead of Nav2 (approach_point_cmdvel).
# A go_to goal ~FOLLOW_DISTANCE behind the person makes Nav2 treat the PERSON as a
# costmap obstacle and plan around / back off / refuse (the rotate-translate-rotate
# balk); a direct Twist ignores the costmap and drives straight at them — faster AND
# more reliable at close range. Beyond the band Nav2 still handles the longer path
# (keeps obstacle avoidance). Enter/exit are FOLLOW_DISTANCE + margin (hysteresis,
# exit > enter, so a person hovering at the boundary doesn't thrash the mode). Off by
# default; gains + the speed cap are ON-ROBOT-UNVERIFIED — A/B before trusting.
# max_speed is sized so one cmd_vel-watchdog window of coast is a safe fraction of
# FOLLOW_DISTANCE (0.4 m/s x ~0.5 s = 0.2 m << 1.2 m).
HRI_FOLLOW_CMDVEL = "0"
HRI_FOLLOW_CMDVEL_ENTER_MARGIN_M = "0.8"   # cmd_vel when target within FOLLOW_DISTANCE + this
HRI_FOLLOW_CMDVEL_EXIT_MARGIN_M = "1.4"    # revert to go_to past FOLLOW_DISTANCE + this
HRI_FOLLOW_CMDVEL_MAX_SPEED = "0.4"        # forward speed cap (m/s) — keep low; see note above
HRI_FOLLOW_CMDVEL_MIN_SPEED = "0.08"       # forward floor (m/s) to overcome base stiction
HRI_FOLLOW_CMDVEL_KP_LIN = "0.8"           # P gain on remaining distance -> forward speed
HRI_FOLLOW_CMDVEL_KP_YAW = "1.2"           # P gain on heading error -> yaw rate (faces the target)
HRI_FOLLOW_CMDVEL_MAX_YAW = "0.8"          # yaw-rate cap (rad/s)
# Window (s) for the ONE synchronous listen right after asking where the bag
# goes (the robot is still then). The follow loop itself does not block-listen.
HRI_FOLLOW_LISTEN_TIMEOUT_SEC = "5"
# Background CommandListener: max length (s) of one record cycle. Also bounds
# how long stop() waits for the recorder to wind down, so keep it modest.
HRI_FOLLOW_RECORD_TIMEOUT_SEC = "30"
# Optional extra delay (s) between nav commands. The follow loop is synchronous —
# the per-tick snapshot + lift already pace it at the detector rate — so 0 means
# flat out (re-command every tick). Raise only if re-issuing go_to that fast
# thrashes the nav stack. The wait also returns instantly on a place command.
HRI_FOLLOW_NAV_PERIOD_SEC = "0"
# Follow control: every tick the base is re-commanded (nav.go_to) toward the
# target's lifted map point, led forward by their velocity × this many seconds,
# stopping HRI_FOLLOW_DISTANCE_M short. Nav orients the base along its travel
# direction, so aiming at the target also faces it — no separate look-at step.
# Raise to aim further ahead of a fast walker (re-acquires sooner, but overshoots
# if too high); 0 = drive straight to where they are now.
HRI_FOLLOW_LEAD_GAIN = "0.9"
# --- Person selection --------------------------------------------------------
# The real host follow picks the host out of the crowd FACE first, falling back
# to ATTIRE (an OSNet vector embedded per candidate person box) only when no
# face in view is recognized as the host. Face detection runs once per tick;
# the attire embeds are the costly part in a crowd. Only the largest this-many
# person boxes are kept as candidates; 0 = keep all (the default — a host who
# walks off shrinks below a nearer guest, so capping by size can drop the real
# host from the candidate set). The largest-person test selector ignores this.
# Both match floors are the perception-wide APPEARANCE_MATCH_THRESHOLD.
# Default 3 (a crowd backstop): the stateful follow selector embeds only the
# box(es) near the last tracked host position each tick, so the cap only bites on
# the rare re-acquire ticks that scan the full frame; raise toward 0 (= all) if a
# host who has walked off is being dropped on those ticks.
HRI_FOLLOW_APPEARANCE_MAX_CANDIDATES = "3"
# The follow selector tracks the host's last box and, on a steady-state tick,
# only embeds the candidate(s) whose center lies within this multiple of the last
# box's width — usually just the host, cutting the per-tick OSNet embeds from N
# to ~1. On a miss (nobody near qualifies) it widens to the full candidate set to
# re-acquire, so the lock is never silently dropped. <=0 disables gating (embed
# every candidate every tick, the old behaviour); raise if a fast-moving host
# jumps out of the gate between ticks.
HRI_FOLLOW_GATE_RADIUS_SCALE = "2"
# Run the FACE pass only every Nth follow tick (and always while re-acquiring,
# i.e. with no current lock). While following, the host's back is to the camera,
# so the face pass matches ~never yet costs a full-frame inference every tick;
# throttling it removes that cost from most ticks while keeping a periodic
# re-acquisition check for when the host turns around. 1 = face every tick (the
# old behaviour).
HRI_FOLLOW_FACE_EVERY_N = "1"
# A box is only followed when the host's attire score beats the best GUEST's by
# at least this margin — not just edges it out. People dress alike at a party,
# so a bare top-1 host match flips onto a guest on embedding noise; the margin
# demands the host clearly win. Raise if it locks onto guests; lower toward 0 if
# it can't hold the host (0 = top-1 wins, the old behaviour).
HRI_FOLLOW_APPEARANCE_MARGIN = "0.05"
# Same idea for the FACE pass: the host's face score must beat the best other
# enrolled person by this margin. Faces are far more discriminative than attire,
# so a small margin is plenty — it just rejects an ambiguous frame.
HRI_FOLLOW_FACE_MARGIN = "0.05"
# --- Follow robustness: don't lock a look-alike (esp. as the host leaves frame) --
# The chosen host box must beat the RUNNER-UP *visible* candidate's host-similarity
# by at least this much, else the tick is ambiguous and the selector returns None
# (follow_person then coasts on its motion prediction rather than risk locking a
# look-alike). This is the core fix for a bystander near the host's last spot being
# picked. 0 = pick the top scorer even in a near-tie (old behaviour). Raise if it
# still grabs look-alikes; lower if it too often coasts in a genuine crowd.
HRI_FOLLOW_VISIBLE_MARGIN = "0.06"
# 1 = drop an attire candidate whose box shows a clearly-visible NON-host face.
# While the host walks away their back is to the camera (no face in their box) but
# bystanders usually face the robot, so a face-shown look-alike who took the host's
# spot is ruled out by their own face even though their clothing matches. 0 = off.
HRI_FOLLOW_EXCLUDE_NONHOST_FACE = "1"
# How far below the face-recognition similarity floor (1 - FACE_MATCH_THRESHOLD) a
# face inside a candidate box must score against the host before that box is called
# "not the host". Larger = more conservative. Default 0.25 → exclude below ~0.35:
# same-person face sims in bad lighting land ~0.4-0.6 while different-person sims
# sit ~0.1-0.3, so this rules out real bystanders without ever excluding a host
# whose single-frame enrollment scores modestly. The face must also clear
# HRI_RECOG_MIN_FACE_AREA_PX + HRI_RECOG_MIN_DET_SCORE — a tiny/blurry face never
# vetoes a candidate.
HRI_FOLLOW_NONHOST_FACE_MARGIN = "0.25"
# After LOSING a previously-held lock (re-acquiring), the attire/face floor is
# raised to this so a look-alike wandering into the host's last spot can't grab a
# fresh lock. The INITIAL acquisition at follow start uses the base
# APPEARANCE_MATCH_THRESHOLD (the host is front-and-center then, and their stored
# attire is from one seated frame, so a high floor would block the follow from
# ever starting). Set equal to APPEARANCE_MATCH_THRESHOLD to disable.
HRI_FOLLOW_REACQUIRE_MIN_SCORE = "0.55"
# Visible-candidate margin used WHILE re-acquiring, in place of
# HRI_FOLLOW_VISIBLE_MARGIN — higher, because committing a fresh lock is riskier
# than holding an existing one.
HRI_FOLLOW_REACQUIRE_MARGIN = "0.10"
# 1 = re-establishing a lock after a loss REQUIRES a face match (no attire-only
# re-acquire). Left OFF by default because a host being followed is normally
# back-turned (face hidden); the raised floor/margin + non-host-face exclusion +
# lock confirmation guard the look-alike case without it. Turn on only if the arena
# reliably shows the host's face on re-acquire.
HRI_FOLLOW_REACQUIRE_REQUIRE_FACE = "0"
# Consecutive confirming ticks before RE-committing a lock after a LOSS. During
# confirmation the selector returns None (the loop coasts/searches), so a
# one-frame fluke match on a look-alike never re-commits. The INITIAL lock at
# follow start always commits on the first qualifying tick — an unconfirmed None
# there makes follow_person rotate-search away from the host. 1 = re-lock on the
# first good tick (old behaviour).
HRI_FOLLOW_LOCK_CONFIRM_TICKS = "2"
# 1 = just before the follow starts, re-embed the host's attire from the current
# (standing) frame and refresh the stored vector (latest-wins): the enrollment
# frame is from OfferSeat with the host SEATED, and the posture change otherwise
# drags every follow-tick attire similarity down. Face-verified and best-effort —
# if the host isn't located in the frame, the old vector is kept. 0 = off.
HRI_FOLLOW_REFRESH_ATTIRE = "1"
# While locked, tolerate this many consecutive no-match ticks (coasting via the
# predictor/grace) before dropping the lock and re-acquiring under the strict
# face-aware gate. Keeps a brief occlusion/turn from forcing a full re-acquire
# without letting a stale lock linger. 0 = drop on the first miss (old behaviour).
HRI_FOLLOW_LOCK_MISS_TOLERANCE = "2"
# Among the boxes that pass the identity gate (face or attire), the follow loop
# prefers the NEAREST: the combined score is similarity + this weight × the
# box's pose-keypoint scale relative to the nearest qualifier. It is only a
# tie-breaker between genuine matches — a near bystander that fails the identity
# gate can never win. 0 = pure similarity (ignore proximity); raise to lean
# harder toward the closest matching body.
HRI_FOLLOW_PROXIMITY_WEIGHT = "0.15"
# Min keypoint confidence for the pose-scale closeness proxy (torso length →
# shoulder width → bbox height). Keypoints below this are ignored; a box with
# too few confident keypoints to measure gets no proximity bonus.
HRI_FOLLOW_POSE_KP_CONF = "0.3"
# 1 = run a follow tick's independent server calls concurrently: pose estimation
# and face detection overlap (separate sub-client sessions), and the attire
# fallback embeds one OSNet vector per candidate box across threads. Identity
# scoring stays single-threaded, so the picked box is identical to the serial
# path — only the latency differs. The real win depends on the server handling
# concurrent requests; with one GPU serializing inference it's just the
# encode/transfer overlap. A/B it against HRI_FOLLOW_TRACK_DEBUG's `select=..ms`.
HRI_FOLLOW_PARALLEL = "1"
# Max concurrent detection requests per tick when HRI_FOLLOW_PARALLEL=1. Kept at
# or below the appearance client's connection-pool size (10) so the fanned-out
# OSNet embeds don't exhaust it.
HRI_FOLLOW_PARALLEL_WORKERS = "4"
# 1 = run scan_seats' seat detection and pose estimation concurrently (separate
# AI-client HTTP sessions, so it's safe); assembly waits for both. With it on,
# the per-stage timings overlap: total ≈ snapshot + max(detect, pose) + assemble,
# so detect+pose no longer sum to total. 0 = serial. Same one-GPU caveat as
# HRI_FOLLOW_PARALLEL — the win may be just the encode/transfer overlap.
HRI_SCAN_PARALLEL = "1"
# 1 = benchmark mode: split scan_seats' detect into one timed call per seat class
# (detect:<class> keys). Slower than the single batched call — diagnostics only.
HRI_SCAN_DETECT_PER_CLASS = "0"
# 1 = log the follow loop's per-tick stage costs (snapshot / select / lift+nav)
# and achieved Hz, so you can see what's capping the rate.
HRI_FOLLOW_TRACK_DEBUG = "1"
# 1 = write an annotated frame every tick to HRI_FOLLOW_VIZ_PATH showing which
# person the loop is locked onto: green box = tracking a fresh detection, yellow
# = coasting on the last-seen box (prediction/grace), red banner = searching.
# Overwrites the file each tick — open it in a viewer that auto-reloads.
HRI_FOLLOW_VIZ = "1"
HRI_FOLLOW_VIZ_PATH = "follow_viz.jpg"
# When a tick yields no detection, keep driving to the last seen point for this
# long (s) before searching — absorbs single dropped pose frames and a briefly
# stationary person (whom the predictor can't extrapolate), so the loop doesn't
# stutter into the rotate-search on every momentary miss.
HRI_FOLLOW_LOST_GRACE_SEC = "1.5"
# When the host is lost past the grace AND there is no usable motion prediction,
# turn this many degrees toward the side they were last seen on, each lost
# frame, until they reappear (non-blocking — never stalls the loop).
HRI_FOLLOW_SEARCH_STEP_DEG = "10"
# Overall time budget (s) for the follow loop before placing the bag anyway.
HRI_FOLLOW_TIMEOUT_SEC = "450"
# Consecutive lost frames (each predicting or turning to look for the host)
# before giving up the search and placing the bag here.
HRI_FOLLOW_MAX_LOST = "100"
# --- Predictive re-acquisition (MotionPredictor) -----------------------------
# 1 = when the host leaves the frame, extrapolate their recent map-frame
# trajectory and drive to the predicted spot before falling back to rotating.
HRI_FOLLOW_PREDICT = "0.7"
# Sliding window (s) of recent sightings used to fit the host's velocity, and
# the minimum number of sightings in it before a velocity is trusted.
HRI_FOLLOW_PREDICT_WINDOW_SEC = "4.0"
HRI_FOLLOW_PREDICT_MIN_SAMPLES = "3"
# Max seconds since the last real sighting that the extrapolation is trusted —
# past this the host has likely turned, so fall back to the rotate-search.
HRI_FOLLOW_PREDICT_HORIZON_SEC = "3.0"
# Speed clamps (m/s): ignore jitter below MIN (treat as standing still, no
# direction to chase) and cap the fitted speed at MAX (human walking pace).
HRI_FOLLOW_PREDICT_MIN_SPEED = "0.15"
HRI_FOLLOW_PREDICT_MAX_SPEED = "1.5"
# Cap (m) on how far ahead of the last real sighting a predicted goal may sit,
# so a noisy velocity fit can't fling the target across the room.
HRI_FOLLOW_PREDICT_MAX_DIST = "3.0"
# A gap (s) between sightings longer than this clears the trajectory history —
# after a long blackout the old velocity is stale and must not be reused.
HRI_FOLLOW_PREDICT_GAP_RESET_SEC = "3.0"
# --- Hybrid lidar tracking (tasks/skills/lidar_track.py) ----------------------
# 1 = hybrid follow: the 2D lidar carries the person's position at scan rate
# (~10 Hz) through a CV-seeded cluster track, while the CV selector runs in a
# background worker as the slow-trusted identity source (seed/confirm/reseed).
# 0 = legacy camera-paced loop. With the flag on but no scan available the loop
# falls back to the legacy path automatically, so this is safe to leave on.
HRI_FOLLOW_LIDAR = "0"
# Main-loop tick (s) in lidar mode — replaces HRI_FOLLOW_NAV_PERIOD_SEC pacing.
# Match the scan period (a faster tick just re-reads the same cached scan).
HRI_FOLLOW_LIDAR_TICK_SEC = "0.1"
# Fixed lidar-sensor -> base_link 2D transform (m, m, deg). 0,0,0 = the sensor
# sits at the base origin facing forward; set from the robot's URDF if not.
HRI_FOLLOW_LIDAR_OFFSET_X = "0.0"
HRI_FOLLOW_LIDAR_OFFSET_Y = "0.0"
HRI_FOLLOW_LIDAR_OFFSET_YAW_DEG = "0.0"
# Ignore beams beyond this (m) — person following is close-range; far returns
# only add wall clusters for the associator to wade through.
HRI_FOLLOW_LIDAR_MAX_RANGE_M = "8.0"
# Jump-distance segmentation: a new cluster starts when the adjacent-beam range
# step exceeds BASE + SLOPE * range (the slope term compensates the beams
# spreading apart with distance).
HRI_FOLLOW_LIDAR_JUMP_BASE_M = "0.10"
HRI_FOLLOW_LIDAR_JUMP_SLOPE = "0.04"
# Person-sized candidate filters: min beams per cluster, and physical width
# (first-to-last point, m) bounds — a leg is ~0.1 m, a torso ~0.4 m; anything
# wider is furniture/wall arc.
HRI_FOLLOW_LIDAR_CLUSTER_MIN_PTS = "3"
HRI_FOLLOW_LIDAR_CLUSTER_MIN_WIDTH_M = "0.05"
HRI_FOLLOW_LIDAR_CLUSTER_MAX_WIDTH_M = "0.80"
# Merge consecutive clusters whose centroids are closer than this (m): two legs
# become one person blob. Geometry only — identity still comes from CV.
HRI_FOLLOW_LIDAR_MERGE_DIST_M = "0.40"
# Association gate around the track's constant-velocity prediction: radius (m)
# at zero staleness, growth per second since the last accepted update, and cap.
# Nearest candidate inside the gate wins; an empty gate is a miss.
HRI_FOLLOW_LIDAR_GATE_M = "0.60"
HRI_FOLLOW_LIDAR_GATE_GROW_MPS = "1.0"
HRI_FOLLOW_LIDAR_GATE_MAX_M = "1.2"
# Alpha-beta filter gains (position / velocity residual weights). Track speed is
# clamped by the shared HRI_FOLLOW_PREDICT_MAX_SPEED.
HRI_FOLLOW_LIDAR_ALPHA = "0.4"
HRI_FOLLOW_LIDAR_BETA = "0.2"
# Continuous empty-gate time (s, over fresh scans) before the track drops into
# the legacy coast (predictor extrapolation -> grace hold -> rotate-search).
HRI_FOLLOW_LIDAR_MISS_SEC = "0.8"
# CV fix handling: a fix farther than RESEED_DIST (m) from the track's
# prediction hard-reseeds it (CV is the identity truth — recovers a stolen
# gate within one CV round-trip); fixes older than MAX_AGE (s) are ignored.
HRI_FOLLOW_LIDAR_CV_RESEED_DIST_M = "1.0"
HRI_FOLLOW_LIDAR_CV_MAX_AGE_SEC = "2.0"
# Min interval (s) between rotate-search steps / lost increments, so
# HRI_FOLLOW_MAX_LOST keeps roughly its CV-paced meaning at the 10 Hz tick.
HRI_FOLLOW_LIDAR_SEARCH_PERIOD_SEC = "0.7"
# Retarget throttle: skip re-issuing nav.go_to when the goal moved less than
# MIN_DELTA (m) since the last issued goal, unless MAX_AGE (s) has elapsed —
# a 10 Hz stream of sub-cm goal changes only thrashes the planner.
HRI_FOLLOW_LIDAR_RETARGET_MIN_DELTA_M = "0.10"
HRI_FOLLOW_LIDAR_RETARGET_MAX_AGE_SEC = "1.0"
# Floor (s) on the CV worker's iteration period. The real pace is the CV
# round-trip (far larger); this only stops a stubbed camera from busy-spinning.
HRI_FOLLOW_LIDAR_CV_MIN_PERIOD_SEC = "0.05"