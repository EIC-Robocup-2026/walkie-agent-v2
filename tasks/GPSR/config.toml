# GPSR task config (rulebook 5.3) — loaded by tasks/GPSR/run.py via
# tasks.common.load_task_config BEFORE the root config.toml, so any key here
# wins over the global value. Shell env and .env still override both.
# Precedence: shell env > .env > this file > root config.toml > code default.

[gpsr]
# Map-frame waypoint "x,y,heading_rad" announced ~2h before the test.
GPSR_INSTRUCTION_POINT_POSE = "6.59,3.65,1.65"
# 1 = on entry, ask a human to open the arena door and wait for it before driving
# to the instruction point (the robot starts outside a possibly-closed door). Uses
# the shared tasks.skills.request_open_door. Default OFF so dev/practice runs with
# no door don't block; turn on for the real run.
# OFF for practice: with no physical door the depth check sees a near surface in the
# centre (head tilted down -> floor, or a near wall) within WALKIE_DOOR_CLEAR_M and
# false-reads "closed", spamming "please open the door". Re-enable ("1") for the real
# arena entry (and level the head before the check if it still false-triggers).
GPSR_REQUEST_DOOR = "1"
# 1 = when a named navigation can't reach its goal, check whether a closed door is
# blocking the way (depth) and, if so, ask a human to open it and retry
# (tasks.skills.go_to_through_door). Only asks on a nav FAILURE and not when the
# path is seen clear, so normal driving is unaffected. Turn OFF (0) if it
# false-asks at a wall/furniture where nav stalls for non-door reasons.
GPSR_NAV_DOOR_RETRY = "1"
# "Close enough" nav promotion (interfaces -> ctx.goto). A placement/pick standing
# pose surveyed right at the furniture (e.g. the cabinet) routinely makes Nav2's
# goal checker return FAILED even though the robot is essentially there. With this
# set, a Nav2 FAILED whose remaining distance is within the tolerance is reported
# as CLOSE_ENOUGH (= reached), so go_to_named/go_to_through_door succeed on the
# first drive and never run the door check -> no phantom "please open the door" at a
# cabinet/table that has no door. A genuinely-blocking arena door leaves the goal
# metres away (across the door), so its FAILED is well outside the tolerance and the
# door ask still fires. Mirrors Restaurant's WALKIE_NAV_GOAL_TOLERANCE_M.
# WALKIE_NAV_GOAL_TOLERANCE_M = "0.5"
# Door at-goal backstop (tasks.skills.go_to_through_door). If nav still FAILs and the
# robot is within this many metres of the goal, treat it as reached instead of asking
# for a door — the near furniture surface reads "closed" on depth, not a real door.
# Widened from the root default (0.5) to cover how far short the robot stops at a
# cabinet/table standing pose; still far below any real arena-door-blocked goal.
WALKIE_DOOR_AT_GOAL_M = "1.0"
# Maximum commands taken in one go (the rulebook issues three).
GPSR_MAX_COMMANDS = "3"
# --- Continuous 3-command capture + per-command verification -----------------
# The referee reads all three commands in ONE continuous, often halting stream
# (mid-command stumbles, uneven pauses). Give that single capture a wide window
# and a larger end-of-speech silence than the mic default (1 s), so a stumble
# doesn't cut the recording between commands. TIMEOUT is the hard cap on the
# recording; MIN_SILENCE is how long the referee must stay quiet before the VAD
# calls the utterance finished (raise it if captures still end mid-stream; lower
# it if the robot waits too long after the referee clearly finished).
# NB (verify on-robot before raising further): a 90 s capture must round-trip
# the STT server in one request — walkie-ai-server must (a) transcribe clips
# longer than Whisper's native 30 s window without truncating, and (b) return
# within the HTTP client's 60 s timeout (client/base.py). Test once with a real
# ~60 s utterance; if it truncates/times out, lower this or fix the server.
GPSR_LISTEN_TIMEOUT_SEC = "90"
GPSR_LISTEN_MIN_SILENCE_MS = "2500"
# Re-capture of ONE corrected command (after a "no" in verification, or a
# recovered missing command): shorter window, still stumble-tolerant.
GPSR_RELISTEN_TIMEOUT_SEC = "30"
GPSR_RELISTEN_MIN_SILENCE_MS = "1500"
# 1 = after parsing, read EACH command back and ask yes/no; a "no" asks the
# operator to repeat JUST that command (−30 rephrasing each, bounded below),
# re-parses and re-confirms; and when fewer than GPSR_MAX_COMMANDS were heard,
# ask whether one was missed and capture it. Execution starts only after every
# command is confirmed — the sure-points strategy: a mishear costs one cheap
# re-ask instead of a wasted multi-minute errand on the 7-minute clock. An
# unclear/silent verdict follows GPSR_CONFIRM_DEFAULT ("proceed" keeps the
# command as heard). In-code default is 0 (pre-change behaviour, what the unit
# tests exercise); this file turns it ON for real runs.
GPSR_VERIFY_COMMANDS = "1"
# Re-captures per command before the exhausted policy below applies.
GPSR_VERIFY_MAX_RECAPTURES = "2"
# What to do with a command the operator could NOT confirm after the re-capture
# budget: "execute" (in-code default — run the best understanding; partial
# credit beats a forfeit) or "skip" (set here — the operator explicitly rejected
# that text N times, so executing it is a likely-WRONG errand; the sure-points
# play is spending those minutes on the confirmed commands instead). A skipped
# command keeps its plan but is announced and never executed.
GPSR_VERIFY_EXHAUSTED = "skip"
# How the operator issues commands: "consecutive" (all at once, enables the
# interleaved-task bonus) or "one_by_one" (return to the instruction point
# between each).
GPSR_ISSUE_MODE = "consecutive"
# 1 = after finishing EACH command, announce it and drive back to the
# instruction point, re-stationing there BEFORE starting the next command —
# command 1 done -> back at the instruction point -> command 2 -> back -> ...
# Applies to the serial executor regardless of GPSR_ISSUE_MODE (one_by_one
# always returns); the final return after the LAST command is the envelope's
# ReturnToInstructionPoint, so this never double-drives the ending. In-code
# default 0 (pre-change behaviour, what the unit tests exercise); ON here for
# real runs. NB: moot under GPSR_INTERLEAVE=1 — the interleaved executor merges
# all commands into one route and never returns mid-run (that IS the bonus).
GPSR_RETURN_BETWEEN_COMMANDS = "1"
# 1 = interleave all commands into one room-batched order to reduce movement (the
# Interleaved Task Bonus, +200). 0 = strictly serial MVP (default — the bonus path
# is riskier and falls back to serial on any scheduling error).
GPSR_INTERLEAVE = "0"
# 1 = run the walkie_graphs perception loop in the background during the task so
# "find/bring object" commands can use long-term spatial memory.
GPSR_START_PERCEPTION = "1"
# GPSR-SCOPED override of the shared perception class list (this file loads before
# services/realtime_explore/config.toml, so it wins during GPSR only — other
# challenges keep the service default). Objects = the OFFICIAL Incheon-2026 list
# (== world.toml [object_categories], spaces for underscores) so every object the
# referee can name is recallable from scene memory (GPSR_FIND_USE_MEMORY); the
# service default only covers 15/39 of them. + the same furniture/context classes.
# Validate tick latency + precision on the GPU box after edits (benchmarks/yoloe).
WALKIE_EXPLORE_INTERESTED_CLASSES = "apple,banana,baseball,bowl,cheezit,chocolate jello,cleanser,coffee grounds,cola,cornflakes,cup,dice,fork,iced tea,juice pack,knife,lemon,milk,mustard,orange,orange juice,peach,pear,plate,plum,pringles,red wine,rubiks cube,soccer ball,spam,sponge,spoon,strawberry,strawberry jello,sugar,tennis ball,tomato soup,tropical juice,tuna,sofa,door,chair,armchair,table,stool,shirt,dish rack,shelf,monitor,bed,pillow"
# find_object scene-memory fallback (skills.py). 1 = when the command names no
# location, or the named place comes up empty, recall where the object was last
# seen from the walkie_graphs CLIP scene graph, drive there, and confirm with a
# live detection. Object positions come from the scene graph, not world.toml
# (which holds only fixed places); objects move/vary, so a static lookup can't
# find them. Needs GPSR_START_PERCEPTION=1 to have anything stored.
GPSR_FIND_USE_MEMORY = "1"
# How far (m) to stop short of a recalled object position when approaching it.
GPSR_FIND_APPROACH_M = "0.8"
# 1 = speak the parsed plan for each command before executing — this is what
# scores "demonstrate a plan has been generated" (3×100). Leave on.
GPSR_SPEAK_PLAN = "1"
# Human approval gate (tasks/GPSR/subtasks.py): after speaking a command's plan,
# ASK a person "should I carry this out?" and only execute if approved. "plan is
# this — okay?" Off (0) by default because the rulebook GPSR run is autonomous (no
# operator confirmation during execution); turn ON (1) for supervised practice/demos
# where a human vets each plan before the robot acts. A clear "no" skips that command
# (it stays demonstrated/PLANNED but is not executed); a clear "yes" runs it.
GPSR_CONFIRM_PLAN = "0"
# What to do when the confirmation answer is UNCLEAR/silent even after one re-ask:
# "proceed" (default — don't forfeit a command on an STT mishear) or "skip" (require
# a clear yes). Only consulted when GPSR_CONFIRM_PLAN=1.
GPSR_CONFIRM_DEFAULT = "proceed"
# Recovery when a command can't be parsed (rulebook 5.3). Re-ask only on an empty
# parse and keep it small — each rephrasing request costs −30 (§5.2).
GPSR_MAX_REPHRASINGS = "2"
# 1 = after rephrasings are exhausted, request a custom operator (a clearer human
# speaker; −20/command but recovers the command) rather than giving up.
GPSR_USE_CUSTOM_OPERATOR = "1"
# Listening attempts with the custom operator before giving up (the rulebook gives
# the custom operator three attempts).
GPSR_CUSTOM_OPERATOR_ATTEMPTS = "3"
# NOTE: the arena map/vocab is the SINGLE global file (repo-root world.toml, or
# $WALKIE_MAP_FILE) shared by every challenge — there is no per-task GPSR map knob
# anymore. Set WALKIE_MAP_FILE in the root config.toml [map] to swap arenas.
# Manipulation gate (mirrors RESTAURANT_ARM_CALIBRATED). 0 = pick/place steps fall
# through to the Tier-2 agent. 1 = the Tier-1 pick/place skills (tasks/GPSR/skills.py
# -> the shared grasp system) handle them deterministically. `deliver` always stays
# Tier-2 (a robot->human handover isn't a grasp primitive).
#
# Left at PR #31's value (0 = GPSR pick via the Tier-2 agent). Flip to 1 to have GPSR's
# run-loop use the deterministic shared pick (tasks/GPSR/skills.py -> pick_object); the
# pick now tucks the arm after grasping so nav can continue. Validate on-robot first.
GPSR_ENABLE_MANIPULATION = "1"
# Tier-1 retry before falling back to the agent (tasks/GPSR/dispatch.py). When a
# deterministic skill fails, RE-RUN it this many times TOTAL before handing the step
# to the scoped Tier-2 agent fallback. Most failures are small and transient (a
# flickered detection, a nav goal that needs a second go), so retrying the cheap
# deterministic skill beats escalating to an LLM agent on the first stumble. "1" =
# no retry (the pre-change behaviour, still the in-code default for unit tests);
# "2"-"3" is a good on-robot range. NB: some skills already retry internally (grasp
# 3x, approach 3x, nav-door 2x) — this stacks on top, so raise cautiously on the
# 7-minute GPSR clock. PAUSE_SEC is the wait between attempts (lets the scene settle).
GPSR_TIER1_RETRY_ATTEMPTS = "2"
GPSR_TIER1_RETRY_PAUSE_SEC = "1.0"
# Tier-2 arm tools (agents/actuator_agent pick_up_object/place_object_down) are
# gated separately from GPSR_ENABLE_MANIPULATION by FINAL_ARM_CALIBRATED /
# WALKIE_ARM_ENABLED — with both unset a pick that falls to the Tier-2 agent
# only ANNOUNCES the grasp (the first real run read as "the arm never
# connected"). Enable the generic override here so the fallback arm is live
# during GPSR too. NB: this repo can only enable the software path — the arm
# driver on the robot must be up, or the grasp still fails (then honestly).
WALKIE_ARM_ENABLED = "1"
# For each run the people in the scene is different
GPSR_PEOPLE_RESET = "1"
# find_person scan (tasks/GPSR/skills.py): when the forward view at the arrival
# heading shows nobody matching, the robot rotates in place through a full turn,
# re-detecting at each stop. This many stops over 360 deg (6 -> 60 deg each);
# higher = more thorough but slower. 0 disables the scan (honest negative from the
# single forward frame, the pre-scan behavior).
GPSR_PERSON_SCAN_STEPS = "6"
# Seconds to wait after each scan rotation before grabbing the frame to detect. The
# base sways briefly after the (blocking) rotation stops and the camera pipeline
# lags, so detecting too soon gets a motion-blurred/stale frame and misses the
# person. Raise if people are still missed mid-scan; lower to scan faster. 0 = no
# wait (detect immediately on stop).
GPSR_PERSON_SCAN_SETTLE_SEC = "0.7"
# count-people scan (tasks/GPSR/skills.py::_count_people_scanning): counting people
# in a room also rotates a full turn (people scatter), counting UNIQUE bodies.
# Stops over 360 deg (defaults to GPSR_PERSON_SCAN_STEPS when unset); reuses
# GPSR_PERSON_SCAN_SETTLE_SEC for the post-rotation settle. DEDUP_M is the radius
# (m) under which two lifted person positions count as the same body. It must sit
# BELOW the separation between two real people (two adults sitting side by side are
# ~0.5 m apart) but ABOVE the cross-frame lift jitter of one person seen in
# overlapping frames (~0.2 m) — 0.4 m is the default sweet spot. Lower it (toward
# 0.3) if people sitting close are merged into one; raise it (toward 0.5) if one
# person is double-counted across stops.
GPSR_COUNT_SCAN_STEPS = "6"
GPSR_COUNT_DEDUP_M = "0.4"
# find_object room scan (tasks/GPSR/skills.py::_find_object_scanning): when the
# forward view at the arrival heading misses the object, rotate a full turn and
# re-detect at each stop (mirrors the person scan; reuses
# GPSR_PERSON_SCAN_SETTLE_SEC). The first real run stared at the bed while the
# plant sat across the bedroom. 0 disables (honest negative from one frame;
# also the in-code default so bare unit tests keep the old single-frame flow).
GPSR_OBJECT_SCAN_STEPS = "6"
# get_object_property placement scoping (skills.py::_scope_dets_to_place): drop
# detections whose lifted world point is farther than this (m) from the
# placement the robot navigated to — a full-frame detect crowned "dining table"
# the biggest object "in the sink area". 0 disables scoping. Degrades to
# unscoped when the depth lift fails wholesale or no placement is known.
# 0 is also the in-code default (bare unit tests keep the unscoped flow).
GPSR_PROPERTY_SCOPE_M = "1.5"
# Minimum detector confidence for an object detection to count (tasks/GPSR/skills.py
# _detect, applied to find_object / count-objects / get_object_property). Open-vocab
# detectors emit low-confidence boxes even for an absent class; with no floor those
# inflate the object count (len(dets)) and let find_object claim a false "found".
# 0 = keep every detection (behaviour-preserving default). Tune UP on the robot
# (e.g. 0.3) once the real detector's score distribution is known — too high drops
# true objects (count too low / false "not found"), too low keeps the noise.
GPSR_DETECT_CONF_MIN = "0"
# Object counting (count-objects, tasks/GPSR/skills.py _count_objects_stable):
# objects on a placement are static, so instead of one forward frame the robot
# re-shoots the same view FRAMES times and reports the per-frame MEDIAN detection
# count — robust to the open-vocab detector flickering a spurious/dropped box on
# any single frame. SETTLE_SEC is the pause between re-shoots. FRAMES=1 reproduces
# the old single-shot behaviour; 3 is a cheap, robust default.
GPSR_COUNT_OBJ_FRAMES = "3"
GPSR_COUNT_OBJ_SETTLE_SEC = "0.2"
# Grounding fuzzy fallback (tasks/GPSR/world.py _lookup): when an exact alias
# lookup misses, accept the closest vocab entry whose difflib ratio clears this
# cutoff — recovers an STT/LLM near-miss ("kitchen tabel" -> kitchen_table) that
# would otherwise be an ungrounded gap (lost plan + command). Only consulted on a
# miss, so it never overrides a correct exact match. 0 disables (exact-only).
# Raise toward 0.9 if it mis-corrects a genuinely-absent noun to a similar one.
# 0.84, not 0.8: real STT misspellings score >=0.92 ("kitchen tabel" 0.92),
# while short DISTINCT words collide at exactly 0.8 — "plant" grounded to
# "plate" and the robot searched for the wrong thing.
GPSR_GROUNDING_FUZZY_CUTOFF = "0.84"
# follow/guide tracking (tasks/GPSR/tracking.py): how close (m) the robot must get
# to a "follow me to X" destination before the ArrivalStopper ends the follow, and
# how often (s) it polls the robot pose.
GPSR_ARRIVAL_RADIUS_M = "1.0"
GPSR_ARRIVAL_POLL_SEC = "0.5"
# guide mid-route re-acquire (tasks/GPSR/skills.py): when leading a person to a
# destination the robot leads with its back to them, so it can't see if they kept
# up. With this on, guide drives in segments and turns back between hops to
# re-acquire a trailing follower. Default OFF — the turn-arounds + waits cost the
# 7-minute clock and the loop is unvalidated on-robot; enable after a bench test.
GPSR_GUIDE_REACQUIRE = "0"
# Max metres per lead segment before pausing to look back (smaller = checks the
# follower more often, but slower).
GPSR_GUIDE_SEGMENT_M = "2.0"
# When the follower isn't seen after a look-back: how many times to prompt + wait
# before leading on best-effort, and how long (s) to wait each attempt.
GPSR_GUIDE_MAX_MISSES = "3"
GPSR_GUIDE_REACQUIRE_WAIT_SEC = "2.0"
# Minimum parser coverage the Phase-0 gate (tests/test_gpsr_coverage.py) requires.
GPSR_COVERAGE_MIN = "0.85"
# Identity facts the 'say/tell' skill grounds answers with (the day/time are read
# live from the clock). Set the real team identity ~2h before the test.
GPSR_ROBOT_NAME = "Walkie"
GPSR_TEAM_NAME = "EIC"
GPSR_TEAM_AFFILIATION = "Chulalongkorn University"

# --- Visualization ----------------------------------------------------------
# Disable Rerun viz for competition runs. The shared viz service defaults to
# "rerun" (services/viz/config.toml), and a TASK builds it synchronously on the
# main thread (TaskContext.__post_init__ -> get_viz), where its native gRPC/web
# serve can deadlock and freeze the whole run before the first step. GPSR doesn't
# need the viewer, so turn it off here (WALKIE_VIZ_INIT_TIMEOUT_S is a backstop).
# Set "rerun" temporarily to debug geometry on the LAN viewer.
[viz]
WALKIE_VIZ = "none"
