# Task-specific overrides for this challenge.
#
# These keys are loaded ABOVE the repo-root config.toml: anything set here wins
# over the base config (but .env and real shell env still win over this). The
# keys are the exact env-var names — tables are just for grouping. Only list the
# knobs this challenge actually needs to change; everything else falls through to
# the base config.toml / code defaults.

[model]
# Pick the model/temperature for this challenge. Override per task as needed —
# e.g. a heavy reasoning task may want a stronger model than the default.
# WALKIE_MODEL = "anthropic/claude-sonnet-4.5"
# WALKIE_TEMPERATURE = "0"

[perception]
# Example tuning a challenge might tweak (uncomment to use):
# PERCEPTION_INTERVAL_SEC = "3"
# SCENE_PERCEPTION_ENABLED = "1"
