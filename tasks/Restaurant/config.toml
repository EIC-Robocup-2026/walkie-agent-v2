# Restaurant task config (rulebook 5.5) — loaded by tasks/Restaurant/run.py via
# tasks.common.load_task_config BEFORE the root config.toml, so any key here wins
# over the global value. Shell env and .env still override both.
# Precedence: shell env > .env > this file > root config.toml > code default.
#
# PLACEHOLDER. NOTE: this test runs in a REAL, undisclosed restaurant with online
# mapping — there is no pre-mapped arena, so the kitchen-bar "pose" is only a
# relative start reference, not an absolute map waypoint. Mapping in advance is a
# disqualification (rulebook 5.5).

[restaurant]
# Kitchen-bar start pose. Default "current" = anchor wherever the robot is standing
# now and DON'T drive (no pre-mapped arena per rulebook 5.5; the start pose is only a
# relative reference, so just place the robot at the bar and run — no map pose to type
# each time). Set an explicit "x,y,heading_rad" to drive to a fixed map pose instead.
# Captured as the bar anchor at GoToStart; later phases re-acquire the bar/barman
# visually on return (design doc §5.1).
RESTAURANT_KITCHEN_BAR_POSE = "current"
# Horizontal FOV (deg) of the camera (pixel<->bearing conversions).
RESTAURANT_CAMERA_HFOV_DEG = "110"
# How many customers to serve (rulebook scores up to two; tables >= 5 exist).
RESTAURANT_TARGET_CUSTOMERS = "2"
# Extra detect attempts beyond the target before giving up (no caller in view).
RESTAURANT_EXTRA_ATTEMPTS = "3"
# 1 = run only the Phase 0 slice (GoToStart -> scan -> approach) for on-robot bring-up.
RESTAURANT_PHASE0 = "0"
RESTAURANT_SLICE = "place"

# --- Phase 0: caller detection + approach -----------------------------------
# Base-rotation sweep that searches the dining area for a waving customer
# (the head only tilts, so looking around is an in-place base rotation).
RESTAURANT_SCAN_ARC_DEG = "180"      # total arc swept, centered on the dining heading (±90° = full front; widen more if tables wrap to the sides)
RESTAURANT_SCAN_STEP_DEG = "30"      # rotation between snapshots within the arc
RESTAURANT_SCAN_SETTLE_SEC = "0.8"   # settle time after each rotation before capture
# is_calling: a wrist must sit above its shoulder by this fraction of the person's
# bbox height (rejects an arm resting near shoulder level); keypoint conf floor.
RESTAURANT_CALL_WRIST_MARGIN = "0.05"
RESTAURANT_KP_CONF = "0.3"
# Merge callers whose lifted map points are within this distance (same person).
RESTAURANT_CALLER_DEDUP_M = "0.6"
# Stop this far in front of the customer/table (conversational + public-space safe).
RESTAURANT_STANDOFF_M = "0.8"
# Depth camera's accurate range (m). A customer farther than this is lifted to a coarse,
# usually-short map point, so approach_customer closes in over several steps — each step
# stops at most this far from the (coarse) target so the customer lands inside the
# accurate band, then re-detects to refine before stepping again. Set to the ZED's
# trustworthy range (≈4 m here; 3.5 leaves margin).
RESTAURANT_DEPTH_RELIABLE_M = "3.5"
# Conservative approach speed for the public venue — a Nav2/robot-side param;
# recorded here for that tuning (go_to does not cap velocity itself).
RESTAURANT_APPROACH_SPEED = "0.3"
# Generic ctx.goto knob (not RESTAURANT_*): promote a Nav2 FAILED to CLOSE_ENOUGH
# when the robot ended within this many metres of the goal. Stops in-place
# scan rotations logging a spurious FAILED, and — critically — stops the serve
# loop abandoning a customer it actually reached when Nav2's goal checker didn't
# converge to the exact pose. Only reinterprets go_to's RESULT; it does NOT loosen
# Nav2's controller (the "won't settle / keeps creeping" is robot-side Nav2 yaml).
# 0.4 (not 0.15): on-robot the approach stops ~0.3 m short of the 0.8 m standoff
# (Nav2 halts at the table/customer inflation boundary), so a tighter value never
# promotes and the approach retries forever. 0.4 still leaves the robot ~0.8–1.2 m
# from the customer — a safe conversational distance.
WALKIE_NAV_GOAL_TOLERANCE_M = "0.4"

# --- Phase 1: re-acquire on return (anti-drift, design §5.1) -----------------
# When returning to a customer, accept a re-detected person within this distance
# of the stored point as "the same customer" (else keep the stored point).
RESTAURANT_REACQUIRE_RADIUS_M = "1.5"
# When back at the bar, treat a person within this distance of the anchor as the barman.
RESTAURANT_BARMAN_RADIUS_M = "2.5"
# Rotate this many DEGREES from the bar-anchor heading (which faces the diners) to face
# the order station / counter when relaying an order — the counter is off to the side of
# the customer-facing start pose. 0 = straight ahead (no turn); +90 = counter on the left,
# -90 = on the right. Flip the sign if the robot turns the wrong way.
RESTAURANT_COUNTER_REL_DEG = "0"
# Treat a fresh caller within this distance of a customer we already took an order
# from as the SAME person, and skip them — so a still-waving customer isn't served
# twice (the loop needs >= 2 DISTINCT customers, rulebook 5.5). MUST be < the table
# spacing or two real customers at adjacent tables get merged and the 2nd is never
# served: this venue's tables are ~1 m apart, so 1.0 was too large — 0.6 (= the
# caller-dedup radius) still absorbs the ~0.3 m position jitter between sweeps.
RESTAURANT_HANDLED_RADIUS_M = "0.6"
# Give up on a spot after this many failed attempts (approach refused, or order
# never parsed in venue noise) so one uncooperative caller can't monopolize every
# attempt while a second waving customer is never reached. < this = transient retry.
RESTAURANT_MAX_FAILS_PER_SPOT = "2"
# Order-taking dialogue (HRI). On an empty/garbled parse, RE-ASK the SAME customer this
# many extra times before giving up — without it one unclear reply made the serve loop
# wander off to find a new customer. CONFIRM_RETRIES = extra re-takes on an explicit "no"
# at the "is that right?" step (a silent/garbled reply still counts as acceptance).
RESTAURANT_ORDER_RETRIES = "2"
RESTAURANT_CONFIRM_RETRIES = "1"

# --- Phase 2: manipulation (CALIBRATION-READY, NOT VALIDATED) ----------------
# MASTER SAFETY GATE. 0 = pick/serve compute + log the target pose but DO NOT move
# the arm (fail-safe). Set to 1 only AFTER the on-robot calibration pass below —
# untested arm motion in a public venue is dangerous (contact = e-stop).
RESTAURANT_ARM_CALIBRATED = "0"
# MoveIt groups (confirm names on the robot).
RESTAURANT_ARM_GROUP = "right_arm"
RESTAURANT_GRIPPER_GROUP = "right_gripper"
# Gripper opening in meters (0.0 closed .. 0.04 open) — calibrate to the objects.
RESTAURANT_GRIPPER_OPEN_M = "0.04"
RESTAURANT_GRIPPER_CLOSED_M = "0.0"
# Grasp orientation roll,pitch,yaw (rad). Default = top-down (pitch 90deg). CALIBRATE.
RESTAURANT_GRASP_RPY = "0,1.5708,0"
# Pre-grasp clearance above the object (m), before descending to grasp.
RESTAURANT_PREGRASP_DZ = "0.10"
# map->base z offset (m): map z-origin vs. floor. ON-ROBOT VERIFY #1. CALIBRATE.
RESTAURANT_Z_OFFSET = "0.0"
# Torso lift (normalized 0..1) while picking from the bar / carrying. CALIBRATE.
RESTAURANT_LIFT_PICK = "0.5"
RESTAURANT_LIFT_CARRY = "0.5"
# Where to place a served item, in the base frame "x_fwd,y_left,z_up" (m). CALIBRATE.
RESTAURANT_PLACE_OFFSET = "0.55,0.0,0.80"
# Arm reach envelope in the base frame (m) — a target outside this is rejected
# ("needs base reposition") instead of commanded. CALIBRATE to the real arm.
RESTAURANT_REACH_X_MIN = "0.20"
RESTAURANT_REACH_X_MAX = "0.85"
RESTAURANT_REACH_Y_MIN = "-0.55"
RESTAURANT_REACH_Y_MAX = "0.55"
RESTAURANT_REACH_Z_MIN = "0.0"
RESTAURANT_REACH_Z_MAX = "1.30"

# --- Phase 3: scheduling + bonus --------------------------------------------
# 1 = batched order-taking: take several nearby orders in one sweep before
# delivering (rulebook allows it; trims walking within the 15-min limit).
RESTAURANT_BATCH = "0"
RESTAURANT_BATCH_SIZE = "2"
# 1 = use an unattached tray to transport orders (optional bonus, 2x200 pts).
# Bimanual + uncalibrated -> currently a logged no-move stub (transport_with_tray).
RESTAURANT_USE_TRAY = "0"
