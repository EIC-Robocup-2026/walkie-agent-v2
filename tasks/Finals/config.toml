# Finals overrides — rulebook §6.2.
#
# PLACEHOLDER: an open-ended household-upkeep + assist-people demonstration that
# composes everything (trash, returning objects to default locations, answering
# raised-hand requests, closing the dishwasher, welcoming a guest at the door).
# Depends on the manipulation-heavy tasks being ready. Strong planner; all
# perception on.

[model]
WALKIE_MODEL = "anthropic/claude-opus-4.5"
WALKIE_TEMPERATURE = "0"

[perception]
HUMAN_PERCEPTION_ENABLED = "1"
SCENE_PERCEPTION_ENABLED = "1"
