# Receptionist overrides.
#
# Conversational, latency-sensitive task: a faster default model keeps the
# greeting snappy. Human perception (face re-ID) must be on so the robot can
# recognise and re-introduce returning guests.

[model]
WALKIE_MODEL = "anthropic/claude-sonnet-4.5"
WALKIE_TEMPERATURE = "0"

[perception]
HUMAN_PERCEPTION_ENABLED = "1"
